<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>RIGORI PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#000a02;--gold:#FFD700;--gold2:#D4900A;--green1:#156010;--green2:#22881a;--white:#F8F8F8;--red:#FF3333;--orange:#FF6B00}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100dvh;overflow:hidden;touch-action:none;background:var(--bg);font-family:'Nunito',sans-serif;font-weight:800;color:var(--white)}
canvas{position:fixed;inset:0;touch-action:none;display:block}

/* Overlays base */
.ov{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,8,0,0.92);backdrop-filter:blur(10px);opacity:0;transition:opacity 220ms ease;padding:16px;overflow-y:auto}
.ov.show{display:flex;opacity:1}

/* Menu */
#menuBall{font-size:clamp(60px,18vw,120px);animation:bounce 1.8s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}
.title{font-family:'Fredoka One',cursive;font-size:clamp(38px,12vw,72px);color:var(--gold);text-shadow:4px 4px 0 rgba(0,0,0,0.6),0 0 40px rgba(255,215,0,0.35);letter-spacing:1px}
.sub{color:rgba(255,255,255,0.55);font-size:clamp(13px,3.5vw,20px);margin-top:4px;letter-spacing:1.5px}
.btn-gold{font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,28px);color:#111;background:linear-gradient(135deg,#FFD700,#D4900A);border:none;border-radius:50px;padding:14px 48px;cursor:pointer;box-shadow:0 6px 28px rgba(255,215,0,0.28);transition:transform 0.12s;margin-top:20px;letter-spacing:1px}
.btn-gold:active{transform:scale(0.91)}
.btn-gold:disabled{opacity:0.28;pointer-events:none}
.foot{color:rgba(255,255,255,0.35);font-size:clamp(10px,2.5vw,13px);margin-top:28px;text-align:center}

/* Team Select */
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:420px;width:100%;padding:0 8px;margin:16px 0}
.tcard{background:rgba(255,255,255,0.05);border:2.5px solid transparent;border-radius:18px;padding:12px 4px 10px;text-align:center;cursor:pointer;transition:all 0.15s ease}
.tcard.sel{border-color:var(--gold);background:rgba(255,215,0,0.10);transform:scale(1.04)}
.tcard .flag{font-size:clamp(28px,8vw,48px);display:block}
.tcard .tn{font-family:'Fredoka One',cursive;font-size:clamp(9px,2.5vw,14px);color:var(--white);margin-top:4px}

/* Bracket */
.bwrap{width:100%;max-width:440px;padding:0 10px}
.bround{font-family:'Fredoka One',cursive;color:var(--gold);font-size:clamp(14px,4vw,22px);text-align:center;margin:10px 0 6px}
.bmatch{display:flex;align-items:center;background:rgba(255,255,255,0.05);border-radius:14px;padding:8px 10px;margin:5px 0;gap:6px}
.bmatch.active{border:2px solid var(--gold);box-shadow:0 0 16px rgba(255,215,0,0.18)}
.bmatch.won{background:rgba(0,220,90,0.09)}
.bmatch.lost{background:rgba(255,50,50,0.07)}
.bteam{flex:1;display:flex;align-items:center;gap:4px;font-size:clamp(11px,3vw,15px)}
.bteam.r{justify-content:flex-end;text-align:right}
.bscore{min-width:60px;text-align:center;font-family:'Fredoka One',cursive;color:var(--gold);font-size:clamp(16px,4.5vw,24px)}

/* Intro VS */
.vs-wrap{display:flex;align-items:center;justify-content:center;gap:clamp(12px,5vw,32px)}
.vs-team{text-align:center}
.vs-flag{font-size:clamp(52px,15vw,88px);display:block}
.vs-name{font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,22px);margin-top:4px}
.vs-txt{font-family:'Fredoka One',cursive;font-size:clamp(32px,10vw,60px);color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.4)}
.vs-left{animation:slideL 0.5s cubic-bezier(0.22,0.68,0,1.4) both}
.vs-right{animation:slideR 0.5s cubic-bezier(0.22,0.68,0,1.4) 0.15s both}
.vs-center{animation:scaleIn 0.4s cubic-bezier(0.22,0.68,0,1.4) 0.3s both}
@keyframes slideL{from{transform:translateX(-80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideR{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:15;display:none;flex-direction:column}
#hudTop{display:flex;align-items:center;background:rgba(0,0,0,0.78);backdrop-filter:blur(10px);padding:clamp(7px,1.5vw,12px) clamp(14px,3vw,24px)}
#hudTop .ht{flex:1;font-size:clamp(11px,3vw,15px);display:flex;align-items:center;gap:4px}
#hudTop .ht.r{justify-content:flex-end}
#hudScore{min-width:86px;text-align:center;font-family:'Fredoka One',cursive;font-size:clamp(24px,7vw,40px);color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,0.45)}
#hudDots{display:flex;align-items:center;justify-content:center;gap:clamp(4px,1vw,7px);background:rgba(0,0,0,0.62);padding:5px 12px}
.dot{width:clamp(7px,2vw,12px);height:clamp(7px,2vw,12px);border-radius:50%;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);transition:all 0.2s}
.dot.goal{background:#00DD66;border-color:#00FF77;box-shadow:0 0 7px #00DD66}
.dot.miss{background:var(--red);border-color:#FF5555}
.dot.current{border-color:var(--gold);animation:dotPulse 1.2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px rgba(255,215,0,0.4)}50%{box-shadow:0 0 14px rgba(255,215,0,0.7),0 0 24px rgba(255,215,0,0.3)}}
.dotsep{color:rgba(255,255,255,0.25);font-size:8px;margin:0 2px}
#hudInfo{text-align:center;font-family:'Fredoka One',cursive;color:rgba(255,255,255,0.65);font-size:clamp(9px,2.5vw,13px);letter-spacing:0.5px;background:rgba(0,0,0,0.55);padding:4px 8px}

/* Sound btn */
#sndBtn{position:fixed;top:clamp(7px,1.5vw,12px);right:clamp(10px,2vw,16px);z-index:30;width:clamp(36px,8vw,48px);height:clamp(36px,8vw,48px);border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid rgba(255,255,255,0.18);backdrop-filter:blur(5px);color:#fff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center}

/* Win */
.trophy{font-size:clamp(60px,20vw,100px);display:block;animation:trophyIn 0.9s cubic-bezier(0.22,0.68,0,1.4) both}
@keyframes trophyIn{0%{transform:scale(0) rotate(-25deg);opacity:0}70%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.win-title{font-family:'Fredoka One',cursive;font-size:clamp(32px,10vw,56px);color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,0.4)}

/* Landscape overlay */
#landOv{position:fixed;inset:0;z-index:100;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,28px);text-align:center;gap:12px}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="landOv"><span style="font-size:48px">📱</span>Ruota il dispositivo</div>

<!-- MENU -->
<div id="scrMenu" class="ov show">
  <div id="menuBall">⚽</div>
  <div class="title">RIGORI PRO</div>
  <div class="sub">Il Grande Torneo Mondiale</div>
  <button class="btn-gold" onclick="goTeam()">▶&nbsp; RIGORI</button>
  <button class="btn-gold" onclick="goFreeKick()" style="margin-top:10px;font-size:clamp(14px,4vw,20px)">🎯&nbsp; PUNIZIONI</button>
  <div class="foot">Swipe per tirare &nbsp;•&nbsp; Tap per parare</div>
</div>

<!-- TEAM SELECT -->
<div id="scrTeam" class="ov">
  <div class="title" style="font-size:clamp(20px,6vw,32px)">Scegli la Squadra</div>
  <div class="tgrid" id="tgrid"></div>
  <button class="btn-gold" id="btnStart" disabled onclick="goTournament()">INIZIA IL TORNEO ⚡</button>
  <button onclick="fullReset()" style="margin-top:14px;background:none;border:none;color:rgba(255,255,255,0.45);font-family:'Fredoka One',cursive;font-size:clamp(14px,3.5vw,18px);cursor:pointer;">← INDIETRO</button>
</div>

<!-- BRACKET -->
<div id="scrBracket" class="ov">
  <div id="bracketContent"></div>
  <button class="btn-gold" onclick="goBracketNext()" style="margin-top:12px">AVANTI ▶</button>
</div>

<!-- INTRO VS -->
<div id="scrIntro" class="ov">
  <div id="introRound" class="bround" style="margin-bottom:16px"></div>
  <div class="vs-wrap">
    <div class="vs-team vs-left"><span class="vs-flag" id="vsFlag1"></span><div class="vs-name" id="vsName1"></div></div>
    <div class="vs-txt vs-center">VS</div>
    <div class="vs-team vs-right"><span class="vs-flag" id="vsFlag2"></span><div class="vs-name" id="vsName2"></div></div>
  </div>
  <button class="btn-gold" onclick="goPlay()" style="margin-top:24px">🏁 FISCHIO D'INIZIO</button>
</div>

<!-- WIN -->
<div id="scrWin" class="ov">
  <span class="trophy">🏆</span>
  <div class="win-title">CAMPIONE!</div>
  <div id="winTeam" style="font-size:clamp(20px,6vw,32px);margin:8px 0"></div>
  <div style="color:rgba(255,255,255,0.6);font-size:clamp(13px,3.5vw,18px)">Sei il Campione del Mondo!</div>
  <button class="btn-gold" onclick="fullReset()">🔄 NUOVO TORNEO</button>
</div>

<!-- LOSE -->
<div id="scrLose" class="ov">
  <div style="font-size:clamp(48px,14vw,80px)">😤</div>
  <div class="title" style="color:var(--white);font-size:clamp(28px,8vw,44px)">Eliminato!</div>
  <div id="loseTxt" style="color:rgba(255,255,255,0.6);font-size:clamp(13px,3.5vw,18px);margin:8px 0"></div>
  <button class="btn-gold" onclick="fullReset()">🔄 RIPROVA</button>
</div>

<!-- FK RESULT -->
<div id="scrFkResult" class="ov">
  <div id="fkResEmoji" style="font-size:clamp(48px,14vw,80px)">&#9917;</div>
  <div id="fkResTitle" class="title" style="font-size:clamp(26px,8vw,42px)"></div>
  <div id="fkResScore" style="font-family:'Fredoka One',cursive;font-size:clamp(42px,13vw,68px);color:var(--gold);margin:8px 0"></div>
  <div id="fkResMsg" style="color:rgba(255,255,255,0.6);font-size:clamp(13px,3.5vw,18px);margin:8px 0;text-align:center;max-width:340px"></div>
  <button class="btn-gold" onclick="goFreeKick()">&#128260; RIPROVA</button>
  <button class="btn-gold" onclick="fullReset()" style="margin-top:10px">&#127968; MENU</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hudTop">
    <div class="ht" id="hudL"></div>
    <div id="hudScore">0 - 0</div>
    <div class="ht r" id="hudR"></div>
  </div>
  <div id="hudDots"></div>
  <div id="hudInfo"></div>
</div>
<button id="sndBtn" onclick="toggleSound()">🔊</button>
<button id="homeBtn" onclick="fullReset()" style="position:fixed;top:clamp(7px,1.5vw,12px);left:clamp(10px,2vw,16px);z-index:30;width:clamp(36px,8vw,48px);height:clamp(36px,8vw,48px);border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid rgba(255,255,255,0.18);backdrop-filter:blur(5px);color:#fff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center">🏠</button>

<script>
'use strict';

/* ===== CANVAS SETUP ===== */
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let DPR, W, H;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = innerWidth * DPR;
  H = innerHeight * DPR;
  cv.width = W; cv.height = H;
  cv.style.width = innerWidth + 'px';
  cv.style.height = innerHeight + 'px';
  checkOrientation();
}
resize();
addEventListener('resize', resize);

function checkOrientation() {
  const lo = document.getElementById('landOv');
  if (innerWidth > innerHeight) { lo.style.display = 'flex'; } 
  else { lo.style.display = 'none'; }
}

/* ===== TEAMS ===== */
const TEAMS = [
  { id:'it', nome:'Italia',      flag:'🇮🇹', jc:'#0035AD', jc2:'#FFFFFF' },
  { id:'br', nome:'Brasile',     flag:'🇧🇷', jc:'#009A40', jc2:'#FFD500' },
  { id:'de', nome:'Germania',    flag:'🇩🇪', jc:'#EEEEEE', jc2:'#111111' },
  { id:'fr', nome:'Francia',     flag:'🇫🇷', jc:'#002395', jc2:'#FFFFFF' },
  { id:'ar', nome:'Argentina',   flag:'🇦🇷', jc:'#74ACDF', jc2:'#FFFFFF' },
  { id:'es', nome:'Spagna',      flag:'🇪🇸', jc:'#C60B1E', jc2:'#FFD500' },
  { id:'pt', nome:'Portogallo',  flag:'🇵🇹', jc:'#006600', jc2:'#FF2200' },
  { id:'en', nome:'Inghilterra', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', jc:'#F5F5F5', jc2:'#CF081F' }
];

/* ===== STATE ===== */
let gst = 'menu'; // game state
let mst = 'idle';  // match state
let selectedTeam = null;
let bracket = [];
let roundIdx = 0; // 0=quarti,1=semi,2=finale
let currentMatch = null;
let aiSkill = 0.28;
let playerShoots = true;
let penIdx = 0;
let maxPen = 5;
let pScore = 0, aScore = 0;
let pResults = [], aResults = [];
let suddenDeath = false;
let history = []; // player shot zone history

/* Ball */
let ball = {};
/* GK */
let gk = {};
/* AI runner */
let aiRun = {};
/* Player kicker */
let playerKick = {};
/* Aim/Touch */
let aim = { show: false, x: 0, y: 0, inGoal: false, spinDir: 0, spinMag: 0 };
let td = { on: false, sx: 0, sy: 0, cx_: 0, cy_: 0, st: 0 };
/* Keeper choice */
let kChoice = null;
let _cpuShotZone = null;
let isFreeKick = false;
let fkIdx = 0, fkScore = 0, fkTotal = 5, fkResults = [];
let wall = null, fkKeeperTimer = null;
let kZones = null;
/* Text FX */
let txt = { show: false, text: '', color: '', t: 0 };
/* Particles */
let parts = [];
/* Shake */
let shk = { x: 0, y: 0, p: 0 };
/* Slow motion */
let slo = { on: false, f: 1, target: 1, dur: 0, t: 0 };
/* Confetti */
let conf = [];
let goalFlash = { active: false, t: 0 };
/* Lean hint */
let leanHint = { show: false, dir: '', alpha: 1, t: 0 };
/* Timeouts */
let shootTimeout = null, keepTimeout = null, leanTimer = null, aiRunTimer = null, autoKeepTimer = null;
let advanceTimer = null, penResultTimer = null;
/* Crowd ambient */
let crowdInterval = null;
/* Sound */
let soundOn = true;
let ac = null;

/* ===== HELPERS ===== */
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}
function rrect(x, y, w, h, r) {
  if (cx.roundRect) {
    cx.beginPath();
    cx.roundRect(x, y, w, h, r);
  } else {
    // Polyfill
    r = Math.min(r, w/2, h/2);
    cx.beginPath();
    cx.moveTo(x+r, y);
    cx.lineTo(x+w-r, y);
    cx.quadraticCurveTo(x+w, y, x+w, y+r);
    cx.lineTo(x+w, y+h-r);
    cx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    cx.lineTo(x+r, y+h);
    cx.quadraticCurveTo(x, y+h, x, y+h-r);
    cx.lineTo(x, y+r);
    cx.quadraticCurveTo(x, y, x+r, y);
    cx.closePath();
  }
}

/* ===== PERSPECTIVE HELPER ===== */
// Applied ONLY to visual drawing, not to game logic coordinates
function vX(x, y) {
  // Compress horizontally toward center as y rises toward goal
  // y=H: t=0 (no compress) → y=PT(): t=1 (max compress 24%)
  const t = Math.max(0, Math.min(1, (H - y) / (H - PT())));
  return W/2 + (x - W/2) * (1 - t * 0.24);
}
function vPt(x, y) { return { x: vX(x, y), y }; }

/* ===== PORTA GEOMETRY ===== */
function PL() { return W * 0.22; }
function PR() { return W * 0.78; }
function PT() { return H * 0.15; }
function PB() { return H * 0.38; }
function PW() { return PR() - PL(); }
function PH() { return PB() - PT(); }
function PCX() { return W * 0.50; }
function PCY() { return (PT() + PB()) / 2; }
function BSX() { return W * 0.50; }
function BSY() { return isFreeKick ? H * 0.63 : H * 0.78; }

/* ===== SCREENS ===== */
function showScreen(id) {
  document.querySelectorAll('.ov').forEach(o => { o.classList.remove('show'); });
  if (id) { const el = document.getElementById(id); el.classList.add('show'); }
}

function goTeam() {
  sfxTick();
  showScreen('scrTeam');
  buildTeamGrid();
  gst = 'team';
}

function buildTeamGrid() {
  const g = document.getElementById('tgrid');
  g.innerHTML = '';
  TEAMS.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'tcard';
    d.innerHTML = `<span class="flag">${t.flag}</span><div class="tn">${t.nome}</div>`;
    d.onclick = () => { sfxTick(); selectTeam(i); };
    g.appendChild(d);
  });
}

function selectTeam(i) {
  selectedTeam = TEAMS[i];
  document.querySelectorAll('.tcard').forEach((c, j) => c.classList.toggle('sel', j === i));
  document.getElementById('btnStart').disabled = false;
}

function goTournament() {
  sfxTick();
  roundIdx = 0;
  aiSkill = 0.28;
  buildBracket();
  showBracket();
}

function buildBracket() {
  let others = TEAMS.filter(t => t.id !== selectedTeam.id);
  shuffle(others);
  others = others.slice(0, 7);
  let teams8 = [selectedTeam, ...others];
  // Player always in match 0
  let rest = teams8.slice(1);
  shuffle(rest);
  bracket = [[selectedTeam, rest[0]], [rest[1], rest[2]], [rest[3], rest[4]], [rest[5], rest[6]]];
}

const ROUND_NAMES = ['QUARTI DI FINALE', 'SEMIFINALE', 'FINALE'];

function showBracket() {
  showScreen('scrBracket');
  gst = 'bracket';
  const bc = document.getElementById('bracketContent');
  let html = `<div class="bround">${ROUND_NAMES[roundIdx]}</div>`;
  bracket.forEach((m, i) => {
    const isPlayer = (m[0].id === selectedTeam.id || m[1].id === selectedTeam.id);
    let cls = 'bmatch';
    if (m.score) {
      if (isPlayer) cls += m.winner?.id === selectedTeam.id ? ' won' : ' lost';
      else cls += ' won';
    } else if (isPlayer) cls += ' active';
    const s = m.score ? `${m.score[0]} - ${m.score[1]}` : 'vs';
    html += `<div class="${cls}">
      <div class="bteam">${m[0].flag} ${m[0].nome}</div>
      <div class="bscore">${s}</div>
      <div class="bteam r">${m[1].nome} ${m[1].flag}</div>
    </div>`;
  });
  bc.innerHTML = html;
}

function goBracketNext() {
  sfxTick();
  // Find player's match
  currentMatch = bracket.find(m => !m.score && (m[0].id === selectedTeam.id || m[1].id === selectedTeam.id));
  if (!currentMatch) return;
  showIntro();
}

function showIntro() {
  showScreen('scrIntro');
  gst = 'intro';
  const t1 = currentMatch[0], t2 = currentMatch[1];
  document.getElementById('introRound').textContent = ROUND_NAMES[roundIdx];
  document.getElementById('vsFlag1').textContent = t1.flag;
  document.getElementById('vsName1').textContent = t1.nome;
  document.getElementById('vsFlag2').textContent = t2.flag;
  document.getElementById('vsName2').textContent = t2.nome;
  // Re-trigger animations
  document.querySelectorAll('.vs-left,.vs-right,.vs-center').forEach(el => {
    el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
  });
}

function goPlay() {
  sfxWhistle();
  showScreen(null);
  gst = 'play';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('sndBtn').style.display = 'flex';
  pScore = 0; aScore = 0;
  pResults = []; aResults = [];
  penIdx = 0; suddenDeath = false;
  playerShoots = true;
  updateHud();
  setupPen();
  startCrowdAmbient();
}

/* ===== HUD ===== */
function updateHud() {
  const opp = currentMatch[0].id === selectedTeam.id ? currentMatch[1] : currentMatch[0];
  document.getElementById('hudL').innerHTML = `${selectedTeam.flag} ${selectedTeam.nome}`;
  document.getElementById('hudR').innerHTML = `${opp.nome} ${opp.flag}`;
  document.getElementById('hudScore').textContent = `${pScore} - ${aScore}`;
  // Dots
  let dotsHtml = '';
  const total = Math.max(maxPen, pResults.length, aResults.length);
  for (let i = 0; i < Math.max(5, total + (suddenDeath ? 1 : 0)); i++) {
    let cls = 'dot';
    if (i < pResults.length) cls += pResults[i] ? ' goal' : ' miss';
    else if (i === pResults.length && playerShoots) cls += ' current';
    dotsHtml += `<div class="${cls}"></div>`;
  }
  dotsHtml += '<span class="dotsep">●</span>';
  for (let i = 0; i < Math.max(5, total + (suddenDeath ? 1 : 0)); i++) {
    let cls = 'dot';
    if (i < aResults.length) cls += aResults[i] ? ' goal' : ' miss';
    else if (i === aResults.length && !playerShoots) cls += ' current';
    dotsHtml += `<div class="${cls}"></div>`;
  }
  document.getElementById('hudDots').innerHTML = dotsHtml;
  // Info
  const rn = penIdx + 1;
  const sd = suddenDeath ? 'SUDDEN DEATH — ' : '';
  const action = playerShoots ? '🔥 TIRA TU' : '🧤 PARA TU';
  document.getElementById('hudInfo').textContent = `Rigore ${rn} • ${sd}${action}`;
}

/* ===== AUDIO ===== */
function getAC() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  if (ac.state === 'suspended') ac.resume();
}

function osc(f1, f2, dur, vol, type='sine', delay=0) {
  if (!soundOn || !ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f1, ac.currentTime + delay);
  o.frequency.exponentialRampToValueAtTime(Math.max(f2, 20), ac.currentTime + delay + dur);
  g.gain.setValueAtTime(vol, ac.currentTime + delay);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
  o.connect(g).connect(ac.destination);
  o.start(ac.currentTime + delay);
  o.stop(ac.currentTime + delay + dur + 0.05);
}

function nz(dur, vol, fType, fFreq, delay=0) {
  if (!soundOn || !ac) return;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const s = ac.createBufferSource();
  s.buffer = buf;
  const f = ac.createBiquadFilter();
  f.type = fType;
  f.frequency.value = fFreq;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol, ac.currentTime + delay);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
  s.connect(f).connect(g).connect(ac.destination);
  s.start(ac.currentTime + delay);
  s.stop(ac.currentTime + delay + dur + 0.05);
}

/* ===== SETUP PENALTY ===== */
function resetObjects() {
  clearTimeout(shootTimeout); clearTimeout(keepTimeout); clearTimeout(leanTimer);
  clearTimeout(aiRunTimer); clearTimeout(autoKeepTimer);
  clearTimeout(advanceTimer); clearTimeout(penResultTimer);
  ball = { x: BSX(), y: BSY(), z: 0, vx: 0, vy: 0, vz: 0, spin: 0, flying: false, r_base: W*0.022, r_draw: W*0.022, t: 0, checked: false };
  const gkRestY = PB() - H*0.110*0.62;
  gk = { x: PCX(), y: gkRestY, y_base: gkRestY, diveDir: 0, diveP: 0, diveTarget: PCX(), diveTargetY: gkRestY, jerseyColor: '#FFD700', jerseyColor2: '#111', idleStyle: Math.floor(Math.random() * 4), hasDived: false };
  aiRun = { active: false, y: H*0.90, kicked: false, legAngle: 0, rt: 0, jerseyColor: '#fff', jerseyColor2: '#111' };
  playerKick = { active: false, kicked: false, legAngle: 0, rt: 0, jerseyColor: '#fff', jerseyColor2: '#111' };
  aim = { show: false, x: 0, y: 0, inGoal: false, spinDir: 0, spinMag: 0 };
  td = { on: false, sx: 0, sy: 0, cx_: 0, cy_: 0, st: 0 };
  kChoice = null; kZones = null; _cpuShotZone = null;
  wall = null;
  if (fkKeeperTimer) { clearTimeout(fkKeeperTimer); fkKeeperTimer = null; }
  txt = { show: false, text: '', color: '', t: 0 };
  parts = [];
  shk = { x: 0, y: 0, p: 0 };
  slo = { on: false, f: 1, target: 1, dur: 0, t: 0 };
  leanHint = { show: false, dir: '', alpha: 1, t: 0 };
  goalFlash = { active: false, t: 0 };
}

function setupPen() {
  resetObjects();
  const opp = currentMatch[0].id === selectedTeam.id ? currentMatch[1] : currentMatch[0];
  if (playerShoots) {
    // Player shoots, AI keeps
    gk.jerseyColor = opp.jc; gk.jerseyColor2 = opp.jc2;
    playerKick.active = true; playerKick.kicked = false; playerKick.legAngle = 0; playerKick.rt = 0;
    playerKick.jerseyColor = selectedTeam.jc; playerKick.jerseyColor2 = selectedTeam.jc2;
    mst = 'playerShoot';
    aim.show = true;
    ball._shootStart = Date.now();
    shootTimeout = setTimeout(() => {
      if (mst === 'playerShoot') {
        // Auto weak shot
        doPlayerShot(PCX() + rand(-PW()*0.1, PW()*0.1), PCY(), 0.15);
      }
    }, 6000);
  } else {
    // AI shoots, player keeps
    gk.jerseyColor = selectedTeam.jc; gk.jerseyColor2 = selectedTeam.jc2;
    aiRun.jerseyColor = opp.jc; aiRun.jerseyColor2 = opp.jc2;
    mst = 'playerKeep';
    // Setup 6 keep zones — 2 righe x 3 colonne
    const zw = W*0.285, zh = H*0.115, gap = W*0.028;
    const startX = (W - 3*zw - 2*gap) / 2;
    const rowY1 = H*0.46; // riga alta
    const rowY2 = H*0.60; // riga bassa
    kZones = {
      LH: { x: startX,              y: rowY1, w: zw, h: zh, label: '↖', dir:-1, high:true  },
      CH: { x: startX+zw+gap,       y: rowY1, w: zw, h: zh, label: '↑', dir: 0, high:true  },
      RH: { x: startX+2*(zw+gap),   y: rowY1, w: zw, h: zh, label: '↗', dir: 1, high:true  },
      LL: { x: startX,              y: rowY2, w: zw, h: zh, label: '↙', dir:-1, high:false },
      CL: { x: startX+zw+gap,       y: rowY2, w: zw, h: zh, label: '↓', dir: 0, high:false },
      RL: { x: startX+2*(zw+gap),   y: rowY2, w: zw, h: zh, label: '↘', dir: 1, high:false },
    };
    // AI zone decision
    const aiZone = pickAiZone();
    // Lean hint
    leanTimer = setTimeout(() => {
      const correct = Math.random() < 0.65;
      const wrongZones = ZONES6.filter(z => z !== aiZone);
      leanHint = { show: true, dir: correct ? aiZone : pick(wrongZones), alpha: 1, t: Date.now() };
      setTimeout(() => { leanHint.show = false; }, 550);
    }, 650);
    // AI runner
    aiRun.active = false; aiRun.y = H*0.90; aiRun.kicked = false; aiRun.rt = 0;
    aiRun._zone = aiZone;
    aiRunTimer = setTimeout(() => { aiRun.active = true; }, 1800);
    // Auto-fallback centro-basso
    autoKeepTimer = setTimeout(() => { if (mst === 'playerKeep' && !kChoice) { kChoice = 'CL'; sfxTick(); } }, 4000);
  }
  updateHud();
}

/* ===== AI ZONE PICKING ===== */
const ZONES6 = ['LL','LH','CL','CH','RL','RH'];
function pickAiZone() {
  if (history.length >= 3) {
    const last5 = history.slice(-5);
    const counts = {};
    ZONES6.forEach(z => counts[z] = 0);
    last5.forEach(z => { if (counts[z] !== undefined) counts[z]++; });
    const maxZ = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
    if (maxZ[1] / last5.length > 0.45 && Math.random() < 0.55) return maxZ[0];
  }
  return pick(ZONES6);
}

/* ===== PLAYER SHOT ===== */
function doPlayerShot(aimX, aimY, power, swipeDx, swipeDy) {
  if (mst !== 'playerShoot') return;
  mst = 'flying';
  clearTimeout(shootTimeout);
  playerKick.kicked = true; playerKick.kickT = 0;
  sfxKick();
  ball.flying = true; ball.t = 0;
  const baseSpeed = (7 + power * 15) * DPR;
  const dx = aimX - BSX(), dy = aimY - BSY();
  const dist = Math.hypot(dx, dy) || 1;
  ball.vx = dx / dist * baseSpeed;
  ball.vy = dy / dist * baseSpeed;
  // Tiro secco: nessun pallonetto, vz=0 e gravità azzerata
  ball.vz = 0;
  // Tiro ad effetto: lo swipe orizzontale crea spin (più orizzontale = più curva)
  // swipeDy è negativo verso l'alto, spinFactor sale quando lo swipe è principalmente orizzontale
  const sdx = swipeDx || (aimX - BSX());
  const sdy = swipeDy || (aimY - BSY());
  const horizRatio = Math.abs(sdx) / (Math.abs(sdy) + Math.abs(sdx) * 0.001 + 1);
  const spinEffect = clamp(horizRatio * 0.85, 0, 0.75); // max 75% del componente orizzontale contribuisce allo spin
  // sdx > 0 = swipe a destra = pallone curva a destra = spin positivo (vx aumenta verso destra)
  const spinBase = (Math.abs(sdx) / (Math.abs(sdy) + Math.abs(sdx) + 1)) * power * 1.8;
  // Math.sign(sdx): swipe dx → curva a destra, swipe sx → curva a sinistra
  ball.spin = Math.sign(sdx || 1) * spinBase * (isFreeKick ? (0.30 + spinEffect * 0.65) : (0.15 + spinEffect * 0.45));
  ball._power = power;
  ball._aimY = aimY;
  ball._aimX = aimX;
  // AI keeper reaction — 6 zone detection
  const nx = (aimX - PCX()) / (PW() * 0.5);
  const ny = aimY - PCY(); // negativo = alto
  const side = nx < -0.22 ? 'L' : nx > 0.22 ? 'R' : 'C';
  const height = ny < 0 ? 'H' : 'L';
  const shotZone6 = side + height;
  history.push(shotZone6);
  if (history.length > 8) history.shift();
  ball._shotZone6 = shotZone6;
  const reactionDelay = 180 + (1 - aiSkill) * 340;
  setTimeout(() => aiKeeperDecide(shotZone6), reactionDelay);
}

function zoneToGkDive(zone) {
  const dir  = zone.startsWith('L') ? -1 : zone.startsWith('R') ? 1 : 0;
  const high = zone.endsWith('H');
  const tx   = PCX() + dir * PW() * 0.42;
  const ty   = high ? PT() + PH()*0.16 : PB() - PH()*0.13;
  return { dir, tx, ty };
}

function aiKeeperDecide(shotZone6) {
  if (gk.hasDived) return; // si tuffa una sola volta per tiro
  gk.hasDived = true;
  const correct = Math.random() < aiSkill;
  const targetZone = correct ? shotZone6 : pick(ZONES6.filter(z => z !== shotZone6));
  const d = zoneToGkDive(targetZone);
  gk.diveDir    = d.dir;
  gk.diveTarget = d.tx;
  gk.diveTargetY = d.ty;
  gk.diveP = 0.001;
  gk._targetZone = targetZone;
}

/* ===== AI SHOT ===== */
function doAiShot() {
  const zone = aiRun._zone;
  // 15-20% miss chance
  const missChance = 0.20 - aiSkill * 0.10;
  const isMiss = Math.random() < missChance;
  // ── Coordinate fisse per ciascuna delle 6 zone ──
  const zoneAimMap = {
    LL: { x: PCX() - PW()*0.38, y: PB() - PH()*0.12 },
    LH: { x: PCX() - PW()*0.38, y: PT() + PH()*0.15 },
    RL: { x: PCX() + PW()*0.38, y: PB() - PH()*0.12 },
    RH: { x: PCX() + PW()*0.38, y: PT() + PH()*0.15 },
    CL: { x: PCX(),              y: PB() - PH()*0.12 },
    CH: { x: PCX(),              y: PT() + PH()*0.15 },
  };
  let aimX, aimY;
  if (isMiss) {
    // Tiro fuori: sempre largo
    const missDir = Math.random() < 0.5 ? -1 : 1;
    aimX = PCX() + missDir * PW() * (0.62 + Math.random()*0.20);
    aimY = PT() + PH() * (0.30 + Math.random()*0.40);
    ball._forceSave = false;
    _cpuShotZone = null;
  } else {
    aimX = zoneAimMap[zone].x;
    aimY = zoneAimMap[zone].y;
    ball._forceSave = false;
    _cpuShotZone = zone;
  }
  aiRun._aimY = aimY;
  ball._aimY = aimY;
  mst = 'flying';
  sfxKick();
  ball.flying = true; ball.t = 0;
  ball.x = BSX(); ball.y = BSY();
  const baseSpeed = (9 + Math.random()*8) * DPR;
  const dx = aimX - BSX(), dy = aimY - BSY();
  const dist = Math.hypot(dx, dy) || 1;
  ball.vx = dx / dist * baseSpeed;
  ball.vy = dy / dist * baseSpeed;
  ball.vz = Math.random() * 3 * DPR;
  ball.spin = (aimX - PCX()) / (PW()*0.5) * 0.10;
  ball._power = 0.5 + Math.random()*0.4;
  // Portiere si tuffa nella zona scelta dal giocatore
  const chosen = kChoice || 'CL';
  const d = zoneToGkDive(chosen);
  gk.diveDir     = d.dir;
  gk.diveTarget  = d.tx;
  gk.diveTargetY = d.ty;
  gk.diveP = 0.001;
}

/* ===== BALL UPDATE ===== */
function updateBall(dt) {
  if (!ball.flying) return;
  ball.t += dt * 1000;
  ball.x += ball.vx * dt * 60;
  ball.y += ball.vy * dt * 60;
  ball.z += ball.vz * dt * 60;
  ball.vz -= 0; // nessuna gravità — tiro secco
  ball.vx += ball.spin * dt * 60 * 0.12 * (1 + Math.max(0, 1 - ball.t / 900) * 0.7); // effetto Magnus progressivo
  ball.vx *= 0.9985;
  ball.vy *= 0.9985;
  if (ball.z < 0) { ball.z = 0; ball.vz *= -0.28; }
  // Scaling
  const scale = clamp(1 - (H*0.72 - ball.y) / (H*0.52) * 0.32, 0.28, 1);
  ball.r_draw = ball.r_base * scale;
  // Check result triggers
  if (!ball.checked) {
    const by = ball.y - ball.z; // visual Y
    if (isFreeKick && wall && wall.active && !wall.blocked) {
      const wBaseY = H*0.460, wTopY = H*0.370, wL = PCX()-W*0.115, wR = PCX()+W*0.115;
      const _ax = ball._aimX !== undefined ? ball._aimX : ball.x;
      if (by <= wBaseY && by >= wTopY && ball.x > wL && ball.x < wR && ball.vy < 0 && _ax > wL && _ax < wR) {
        wall.blocked = true; ball.checked = true; ball.flying = false;
        sfxPost(); shk.p = 12*DPR; triggerSlowMo(0.38,0.55);
        ball.vx *= 0.25; ball.vy = Math.abs(ball.vy)*0.35; ball.vz = 2*DPR;
        spawnParticles(ball.x, by, 18, ['#FF6B00','#FFD700','#fff']);
        showTxtFx(pick(['LA BARRIERA!','RESPINTA!','BLOCCATA!']), '#FF6B00');
        penResultTimer = setTimeout(() => penResult(false), 800);
      }
    }
    const _trigY = (ball._aimY !== undefined) ? ball._aimY + H*0.015 : PB() + H*0.015;
    if (ball.y <= _trigY && ball.vy < 0) { ball.checked = true; ball.flying = false; checkResult(by); }
    else if (ball.y < -H*0.12) { ball.checked = true; ball.flying = false; checkResult(by); }
    else if (ball.x < -W*0.20 || ball.x > W*1.20) { ball.checked = true; ball.flying = false; checkResult(by); }
  }
}

/* ===== CHECK RESULT ===== */
function checkResult(visY) {
  const bx = ball.x;
  const by = visY !== undefined ? visY : ball.y - ball.z;
  // 1. Post check
  const hitLP = bx > PL() - W*0.035 && bx < PL() + W*0.008 && by > PT() && by < PB();
  const hitRP = bx > PR() - W*0.008 && bx < PR() + W*0.035 && by > PT() && by < PB();
  const hitBar = Math.abs(by - PT()) < H*0.022 && bx > PL() && bx < PR();
  if (hitLP || hitRP || hitBar) {
    sfxPost();
    shk.p = 14 * DPR;
    triggerSlowMo(0.40, 0.50);
    showTxtFx(pick(['IL PALO!!!','LA TRAVERSA!!!','CHE SFORTUNA!']), '#FF6B00');
    // Bounce
    if (hitLP || hitRP) ball.vx *= -0.6;
    if (hitBar) ball.vy *= -0.5;
    penResultTimer = setTimeout(() => penResult(false), 500);
    return;
  }
  // 2. GK save check - hitbox allineata al disegno effettivo incluso il salto
  const gkJumpDy = gk._jumpDy || 0;
  const gkCY = gk.y + gkJumpDy;
  const gw_h = W * 0.055, gh_h = H * 0.110;
  const diveE = gk._e || 0;
  const ang = gk._angle || 0;
  // Posizione world del guanto principale (speculare a drawGK)
  const leadLX = gk.diveDir * (gw_h*0.5 + gw_h*0.85*diveE);
  const leadLY = -gh_h*0.15 - gh_h*0.32*diveE;
  const gloveWX = gk.x + leadLX * Math.cos(ang) - leadLY * Math.sin(ang);
  const gloveWY = gkCY + leadLX * Math.sin(ang) + leadLY * Math.cos(ang);
  // Hitbox: corpo + reach guanto
  const gkL = Math.min(gk.x - gw_h*0.58, gloveWX - gw_h*0.22);
  const gkR = Math.max(gk.x + gw_h*0.58, gloveWX + gw_h*0.22);
  const gkT = Math.min(gkCY - gh_h*0.82, gloveWY - gw_h*0.22);
  const gkB = gkCY + gh_h*0.65;
  if (bx > gkL && bx < gkR && by > gkT && by < gkB && bx > PL() && bx < PR() && by > PT() && by < PB()) {
    sfxSave();
    shk.p = 7 * DPR;
    if (aiSkill > 0.65) triggerSlowMo(0.35, 0.55);
    // Snap pallone esattamente al centro del portiere — contatto fisico visibile
    ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0;
    // Snap al guanto: se tuffo laterale, sul guanto principale; altrimenti centro
    const contactX = gk.diveDir !== 0 ? gloveWX : gk.x;
    const contactY = gk.diveDir !== 0 ? gloveWY : gkCY;
    ball.x = contactX;
    ball.y = contactY;
    spawnParticles(contactX, contactY, 14, ['#FF6B00','#FFD700','#fff']);
    showTxtFx(pick(['CHE PARATA!','MIRACOLO!','VOLA IL PORTIERE!','RESPINTO!','INCREDIBILE!']), '#FF6B00');
    penResultTimer = setTimeout(() => penResult(false), 650);
    return;
  }
  // 3. Goal check — boundary inferiore include il margine del trigger
  if (bx > PL() && bx < PR() && by > PT() && by < PB() + H*0.02) {
    // Se portiere si è tuffato nella zona giusta → 90% parata
    const ballSide = bx < PCX() - PW()*0.22 ? 'L' : bx > PCX() + PW()*0.22 ? 'R' : 'C';
    const ballHigh = by < PCY() ? 'H' : 'L';
    const ballZone = ballSide + ballHigh;
    if (playerShoots) {
      const gkSide   = gk.diveDir < -0.1 ? 'L' : gk.diveDir > 0.1 ? 'R' : 'C';
      const gkHigh   = gk.diveTargetY < PCY() ? 'H' : 'L';
      if (ballSide === gkSide && ballHigh === gkHigh && Math.random() < 0.90) {
        sfxSave(); shk.p = 7 * DPR;
        ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0;
        ball.x = gk.x; ball.y = gk.y;
        spawnParticles(gk.x, gk.y, 14, ['#FF6B00','#FFD700','#fff']);
        showTxtFx(pick(['CHE PARATA!','MIRACOLO!','VOLA IL PORTIERE!','RESPINTO!','INCREDIBILE!']), '#FF6B00');
        penResultTimer = setTimeout(() => penResult(false), 650);
        return;
      }
    }
    // ── PARATA GARANTITA: zona CPU === zona portiere-giocatore ──
    if (!playerShoots && _cpuShotZone && kChoice && kChoice[0] === _cpuShotZone[0]) {
      sfxSave(); shk.p = 7 * DPR;
      ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0;
      ball.x = gk.x; ball.y = gk.y;
      spawnParticles(gk.x, gk.y, 18, ['#FF6B00','#FFD700','#fff']);
      showTxtFx(pick(['CHE PARATA!','MIRACOLO!','VOLA IL PORTIERE!','RESPINTO!','INCREDIBILE!']), '#FF6B00');
      penResultTimer = setTimeout(() => penResult(false), 650);
      return;
    }
    sfxGoal(); sfxCheer();
    goalFlash = { active: true, t: Date.now() };
    shk.p = 12 * DPR;
    if (ball._power > 0.82) triggerSlowMo(0.38, 0.6);
    spawnParticles(bx, by, 45, ['#FFD700','#fff','#00DD66','#FF6B00']);
    const cornerW = PW() * 0.18;
    const topH = PH() * 0.22;
    const isCorner = bx < PL() + cornerW || bx > PR() - cornerW;
    const isTop = by < PT() + topH;
    let goalTxt;
    if (isCorner) goalTxt = 'ANGOLINO!';
    else if (isTop) goalTxt = 'SOTTO LA TRAVERSA!';
    else goalTxt = pick(['GOOOAL!','CHE BOTTA!','IMPARABILE!','È DENTRO!']);
    showTxtFx(goalTxt, '#00DD66');
    penResultTimer = setTimeout(() => penResult(true), 650);
    return;
  }
  // 4. Miss — solo se palla chiaramente fuori dalla porta
  sfxMiss(); sfxCrowd(0.06);
  let missTxt;
  if (bx < PL() || bx > PR()) missTxt = 'LARGO!';
  else missTxt = 'ALTO!';
  showTxtFx(missTxt, '#FF3333');
  penResultTimer = setTimeout(() => penResult(false), 650);
}

function penResult(scored) {
  if (isFreeKick) { fkResult(scored); return; }
  if (playerShoots) { if (scored) pScore++; pResults.push(scored); }
  else { if (scored) aScore++; aResults.push(scored); }
  updateHud();
  advanceTimer = setTimeout(advance, 1900);
}

function advance() {
  if (playerShoots) {
    playerShoots = false;
    setupPen();
  } else {
    playerShoots = true;
    penIdx++;
    // Check early termination
    if (!suddenDeath) {
      const rem = maxPen - penIdx;
      if (pScore > aScore + rem || aScore > pScore + rem) { endMatch(); return; }
      if (penIdx >= maxPen) {
        if (pScore !== aScore) { endMatch(); return; }
        suddenDeath = true;
        penIdx = maxPen; // Keep counting
        setupPen(); return;
      }
    } else {
      // Sudden death: after both shoot
      if (pScore !== aScore) { endMatch(); return; }
    }
    setupPen();
  }
}

function endMatch() {
  mst = 'done';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('sndBtn').style.display = 'none';
  stopCrowdAmbient();
  const won = pScore > aScore;
  currentMatch.score = [pScore, aScore];
  currentMatch.winner = won ? selectedTeam : (currentMatch[0].id === selectedTeam.id ? currentMatch[1] : currentMatch[0]);
  // Simulate other matches
  bracket.forEach(m => {
    if (!m.score) {
      const s1 = 1 + Math.floor(Math.random()*4), s2 = Math.floor(Math.random()*4);
      const fs2 = s1 === s2 ? Math.max(0, s2-1) : s2;
      m.score = [s1, fs2];
      m.winner = s1 >= fs2 ? m[0] : m[1];
    }
  });
  if (!won) {
    // Lost
    gst = 'lose';
    const opp = currentMatch[0].id === selectedTeam.id ? currentMatch[1] : currentMatch[0];
    document.getElementById('loseTxt').textContent = `Sconfitto da ${opp.flag} ${opp.nome}  •  ${pScore} - ${aScore}`;
    showScreen('scrLose');
  } else {
    roundIdx++;
    if (roundIdx > 2) {
      // Won tournament!
      gst = 'win';
      document.getElementById('winTeam').innerHTML = `${selectedTeam.flag} ${selectedTeam.nome}`;
      showScreen('scrWin');
      spawnConfetti();
    } else {
      // Next round
      aiSkill = Math.min(0.88, aiSkill + 0.22);
      const winners = bracket.map(m => m.winner);
      bracket = [];
      for (let i = 0; i < winners.length; i += 2) {
        bracket.push([winners[i], winners[i+1]]);
      }
      showBracket();
    }
  }
}

function fullReset() {
  sfxTick();
  gst = 'menu';
  mst = 'idle';
  isFreeKick = false;
  fkIdx = 0; fkScore = 0; fkResults = [];
  selectedTeam = null;
  conf = [];
  document.getElementById('hud').style.display = 'none';
  document.getElementById('sndBtn').style.display = 'none';
  stopCrowdAmbient();
  showScreen('scrMenu');
}

/* ===== INPUT ===== */
cv.addEventListener('touchstart', e => {
  e.preventDefault(); getAC();
  onDown({ x: e.touches[0].clientX * DPR, y: e.touches[0].clientY * DPR });
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  onMove({ x: e.touches[0].clientX * DPR, y: e.touches[0].clientY * DPR });
}, { passive: false });
cv.addEventListener('touchend', e => {
  e.preventDefault();
  onUp({ x: e.changedTouches[0].clientX * DPR, y: e.changedTouches[0].clientY * DPR });
}, { passive: false });
cv.addEventListener('mousedown', e => { getAC(); onDown({x:e.clientX*DPR,y:e.clientY*DPR}); });
cv.addEventListener('mousemove', e => { if(td.on) onMove({x:e.clientX*DPR,y:e.clientY*DPR}); });
cv.addEventListener('mouseup', e => onUp({x:e.clientX*DPR,y:e.clientY*DPR}));

function onDown({x,y}) {
  if (mst === 'playerShoot' || mst === 'fkRunup') {
    td = { on: true, sx: x, sy: y, cx_: x, cy_: y, st: Date.now() };
  }
  if ((mst === 'playerKeep' || mst === 'flying') && kZones && !kChoice) {
    for (const [zone, r] of Object.entries(kZones)) {
      if (x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h) {
        kChoice = zone; sfxTick(); break;
      }
    }
  }
}

function calcAimFromSwipe(dx, dy) {
  // Swipe orizzontale → posizione X nella porta (1:1 con direzione dito)
  // Swipe verticale verso l'alto → altezza nella porta (più alto = più alto)
  const aimX = clamp(BSX() + dx * 2.4, PL() - PW()*0.18, PR() + PW()*0.18);
  // dy negativo = su, mappiamo in altezza porta
  const upRatio = clamp(-dy / (H * 0.28), -0.2, 1.3);
  const aimY = PB() - upRatio * PH();
  return { aimX, aimY };
}

function onMove({x,y}) {
  if (mst === 'fkRunup') return; // ignora input durante la rincorsa
  if (td.on && mst === 'playerShoot') {
    td.cx_ = x; td.cy_ = y;
    const dx = td.cx_ - td.sx, dy = td.cy_ - td.sy;
    const { aimX, aimY } = calcAimFromSwipe(dx, dy);
    aim.x = aimX; aim.y = aimY;
    // Spin preview: quanto più lo swipe è orizzontale rispetto al verticale, più c'è effetto
    const spinMag = clamp(Math.abs(dx) / (Math.abs(dy) + 1) * 0.7, 0, 1);
    aim.spinDir = dx >= 0 ? 1 : -1; // 1=curva a dx, -1=curva a sx
    aim.spinMag = spinMag;
    aim.inGoal = aimX > PL() && aimX < PR() && aimY > PT() && aimY < PB();
    aim.show = true;
  }
}

function onUp({x,y}) {
  if (!td.on) return;
  td.on = false;
  if (mst === 'fkRunup') return; // non si può tirare durante la rincorsa
  if (mst !== 'playerShoot') return;
  const dx = td.cx_ - td.sx, dy = td.cy_ - td.sy;
  const dist = Math.hypot(dx, dy);
  const elapsed = Math.max((Date.now() - td.st) / 1000, 0.04);
  if (dist < W * 0.018) return; // Too short
  const swipeSpeed = dist / elapsed;
  const power = clamp(swipeSpeed / (W * 3.2), 0, 1);
  const { aimX, aimY } = calcAimFromSwipe(dx, dy);
  aim.show = false;
  doPlayerShot(aimX, aimY, power, dx, dy);
}

/* ===== AI RUNNER UPDATE ===== */
function updateAiRunner(dt) {
  if (!aiRun.active) return;
  if (aiRun.kicked) { aiRun.kickT = (aiRun.kickT || 0) + dt * 1000; return; }
  if (mst !== 'playerKeep' && mst !== 'flying') return;
  aiRun.rt += dt * 1000;
  aiRun.legAngle = Math.sin(aiRun.rt * 0.014) * 0.45;
  const speed = 0.38 * DPR;
  aiRun.y -= speed * dt * 1000;
  if (aiRun.y <= H * 0.76) {
    aiRun.y = H * 0.76;
    aiRun.kicked = true;
    aiRun.kickT = 0;
    doAiShot();
  }
}

/* ===== EFFECTS ===== */
function triggerSlowMo(target, dur) {
  slo = { on: true, f: target, target, dur, t: 0 };
}
function updSlowMo(dt) {
  if (!slo.on) { slo.f = 1; return; }
  slo.t += dt;
  if (slo.t < slo.dur * 0.5) slo.f = slo.target;
  else if (slo.t < slo.dur) slo.f = lerp(slo.target, 1, (slo.t - slo.dur*0.5) / (slo.dur*0.5));
  else { slo.on = false; slo.f = 1; }
}
function updShake() {
  if (shk.p < 0.5) { shk.x = 0; shk.y = 0; return; }
  shk.x = (Math.random()-0.5) * shk.p;
  shk.y = (Math.random()-0.5) * shk.p;
  shk.p *= 0.83;
}

function showTxtFx(text, color) {
  txt = { show: true, text, color, t: Date.now() };
}

function spawnParticles(px, py, count, colors) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = rand(2, 8) * DPR;
    parts.push({
      x: px, y: py, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp*0.7,
      r: rand(2,5)*DPR, life: rand(0.7,1.2), age: 0,
      color: pick(colors)
    });
  }
}
function updateParts(dt) {
  for (let i = parts.length-1; i >= 0; i--) {
    const p = parts[i];
    p.age += dt; p.x += p.vx; p.y += p.vy;
    p.vy += 0.14 * DPR; p.vx *= 0.97;
    if (p.age >= p.life) parts.splice(i, 1);
  }
}

function spawnConfetti() {
  conf = [];
  const colors = ['#FFD700','#FF5F1F','#00C851','#3B82F6','#FF3B3B','#fff','#FF69B4','#C084FC'];
  for (let i = 0; i < 220; i++) {
    conf.push({
      x: Math.random()*W, y: Math.random()*H - H,
      vx: rand(-1.5,1.5)*DPR, vy: rand(2,5)*DPR,
      rot: Math.random()*Math.PI*2, vrot: rand(-0.08,0.08),
      wob: Math.random()*100, ws: rand(0.04,0.08),
      r: rand(4,8)*DPR, color: pick(colors)
    });
  }
}
function updConf() {
  conf.forEach(c => {
    c.x += c.vx + Math.sin(c.wob)*1.2*DPR;
    c.y += c.vy; c.rot += c.vrot; c.wob += c.ws;
    if (c.y > H + 15*DPR) c.y = -12*DPR;
  });
}

/* ===== STAR POSITIONS (deterministic) ===== */
const stars = [];
for (let i = 0; i < 70; i++) {
  stars.push({

/* ===== DRAW FUNCTIONS ===== */
function drawBG() {
  const now = Date.now() / 1000;
  // Sky gradient
  const skyG = cx.createLinearGradient(0,0,0,H*0.27);
  skyG.addColorStop(0,'#01030e'); skyG.addColorStop(1,'#071408');
  cx.fillStyle = skyG; cx.fillRect(0,0,W,H*0.27);
  // Stars
  stars.forEach(s => {
    const tw = 0.3 + 0.7 * Math.sin(now*1.1 + s.phase);
    cx.globalAlpha = tw * 0.7;
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(s.x*W, s.y*H, s.r*DPR, 0, Math.PI*2); cx.fill();
  });
  cx.globalAlpha = 1;
  // Floodlights (4 beams — 2 per side)
  [[W*0.06,H*0.01],[W*0.14,H*0.01],[W*0.86,H*0.01],[W*0.94,H*0.01]].forEach(([fx,fy]) => {
    const rg = cx.createRadialGradient(fx,fy,0,fx,fy,H*0.55);
    rg.addColorStop(0,'rgba(255,255,210,0.18)');
    rg.addColorStop(0.3,'rgba(255,255,210,0.06)');
    rg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle = rg; cx.fillRect(0,0,W,H*0.58);
  });
  // Spotlight from above (pro)
  const spG = cx.createRadialGradient(W*0.5,H*0.10,0,W*0.5,H*0.10,W*0.55);
  spG.addColorStop(0,'rgba(255,255,230,0.07)');
  spG.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle = spG; cx.fillRect(0,0,W,H*0.55);
  // Crowd
  const rows = 8, cols = Math.floor(W / (5.8*DPR));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const px = c * (W/cols) + (r%2 ? (W/cols)*0.5 : 0) + 1.5*DPR;
      const ry = H*0.01 + r*(H*0.24/rows);
      const wave = Math.sin(now*2.1 + c*0.22 + r*0.75) * 2.8*DPR;
      const py = ry + wave;
      const h2 = (r*131 + c*239 + r*c*11) % 360;
      const lum = 30 + Math.sin(now*1.8 + c*0.35 + r) * 10;
      const alpha = 0.55 + Math.sin(now*2.3 + c*0.5 + r*0.6) * 0.12;
      cx.globalAlpha = alpha;
      cx.fillStyle = `hsl(${h2},52%,${lum}%)`;
      cx.beginPath(); cx.arc(px, py, 2.4*DPR, 0, Math.PI*2); cx.fill();
      cx.fillStyle = '#c4906a';
      cx.beginPath(); cx.arc(px, py - 2.3*DPR, 1.7*DPR, 0, Math.PI*2); cx.fill();
    }
  }
  cx.globalAlpha = 1;
  // ---- PERSPECTIVE FIELD ----
  // Field as trapezoid (wider at bottom = closer to camera)
  const fieldBot = H, fieldTop = PB();
  const fg = cx.createLinearGradient(0,fieldTop,0,fieldBot);
  fg.addColorStop(0,'#156010'); fg.addColorStop(0.45,'#22881a'); fg.addColorStop(1,'#1a7015');
  cx.fillStyle = fg;
  cx.beginPath();
  cx.moveTo(vX(0, fieldBot), fieldBot);
  cx.lineTo(vX(W, fieldBot), fieldBot);
  cx.lineTo(vX(W, fieldTop), fieldTop);
  cx.lineTo(vX(0, fieldTop), fieldTop);
  cx.closePath(); cx.fill();
  // Mowing stripes in perspective
  for (let i = 0; i < 14; i++) {
    if (i%2===0) {
      const sy = fieldTop + i*(fieldBot-fieldTop)/14;
      const ey = fieldTop + (i+1)*(fieldBot-fieldTop)/14;
      cx.fillStyle = 'rgba(0,0,0,0.04)';
      cx.beginPath();
      cx.moveTo(vX(0,sy), sy); cx.lineTo(vX(W,sy), sy);
      cx.lineTo(vX(W,ey), ey); cx.lineTo(vX(0,ey), ey);
      cx.closePath(); cx.fill();
    }
  }
  // Field lines in perspective
  cx.strokeStyle = 'rgba(255,255,255,0.20)';
  cx.lineWidth = Math.max(1.5, 2.2*DPR);
  // Big area (perspective trapezoid)
  const baL = W*0.07, baR = W*0.93, baTop = PB(), baBot = PB()+H*0.34;
  cx.beginPath();
  cx.moveTo(vX(baL,baTop), baTop); cx.lineTo(vX(baR,baTop), baTop);
  cx.lineTo(vX(baR,baBot), baBot); cx.lineTo(vX(baL,baBot), baBot);
  cx.closePath(); cx.stroke();
  // Small area
  const saL = W*0.28, saR = W*0.72, saTop = PB(), saBot = PB()+H*0.17;
  cx.beginPath();
  cx.moveTo(vX(saL,saTop), saTop); cx.lineTo(vX(saR,saTop), saTop);
  cx.lineTo(vX(saR,saBot), saBot); cx.lineTo(vX(saL,saBot), saBot);
  cx.closePath(); cx.stroke();
  // Center line (converging)
  const midY = PB()+H*0.17;
  cx.beginPath(); cx.moveTo(vX(0,midY), midY); cx.lineTo(vX(W,midY), midY); cx.stroke();
  // Penalty dot
  cx.fillStyle = 'rgba(255,255,255,0.28)';
  cx.beginPath(); cx.arc(vX(W*0.5,H*0.72), H*0.72, 3.2*DPR, 0, Math.PI*2); cx.fill();
  // Penalty arc
  const arcY = H*0.72;
  cx.beginPath();
  for (let a = 0.65*Math.PI; a <= 0.35*Math.PI+0.01; a -= 0.03) {
    const ax = W*0.5 + Math.cos(a)*W*0.095;
    const ay = arcY + Math.sin(a)*W*0.095;
    const vax = vX(ax, ay);
    a === 0.65*Math.PI ? cx.moveTo(vax, ay) : cx.lineTo(vax, ay);
  }
  cx.stroke();
  // Field-goal shadow gradient
  const fgShG = cx.createLinearGradient(0,PB(),0,PB()+H*0.08);
  fgShG.addColorStop(0,'rgba(0,0,0,0.30)'); fgShG.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle = fgShG;
  cx.beginPath();
  cx.moveTo(vX(0,PB()),PB()); cx.lineTo(vX(W,PB()),PB());
  cx.lineTo(vX(W,PB()+H*0.08),PB()+H*0.08); cx.lineTo(vX(0,PB()+H*0.08),PB()+H*0.08);
  cx.closePath(); cx.fill();
}

function drawGoal() {
  const l = PL(), r = PR(), t = PT(), b = PB(), w = PW(), h = PH();
  const dp = W * 0.038, dv = H * 0.022; // depth offset x, y
  // --- 3D BACK PANELS ---
  // Top roof
  const roofG = cx.createLinearGradient(0, t-dv, 0, t);
  roofG.addColorStop(0,'rgba(20,20,20,0.75)'); roofG.addColorStop(1,'rgba(60,60,60,0.25)');
  cx.fillStyle = roofG;
  cx.beginPath(); cx.moveTo(l,t); cx.lineTo(r,t); cx.lineTo(r+dp,t-dv); cx.lineTo(l-dp,t-dv); cx.closePath(); cx.fill();
  // Left side wall
  const lwG = cx.createLinearGradient(l-dp, 0, l, 0);
  lwG.addColorStop(0,'rgba(0,0,0,0.60)'); lwG.addColorStop(1,'rgba(0,0,0,0.10)');
  cx.fillStyle = lwG;
  cx.beginPath(); cx.moveTo(l,t); cx.lineTo(l,b); cx.lineTo(l-dp,b-dv); cx.lineTo(l-dp,t-dv); cx.closePath(); cx.fill();
  // Right side wall
  const rwG = cx.createLinearGradient(r, 0, r+dp, 0);
  rwG.addColorStop(0,'rgba(0,0,0,0.10)'); rwG.addColorStop(1,'rgba(0,0,0,0.50)');
  cx.fillStyle = rwG;
  cx.beginPath(); cx.moveTo(r,t); cx.lineTo(r,b); cx.lineTo(r+dp,b-dv); cx.lineTo(r+dp,t-dv); cx.closePath(); cx.fill();
  // Back net (depth face)
  cx.fillStyle = 'rgba(0,0,0,0.55)';
  cx.beginPath(); cx.moveTo(l-dp,t-dv); cx.lineTo(r+dp,t-dv); cx.lineTo(r+dp,b-dv); cx.lineTo(l-dp,b-dv); cx.closePath(); cx.fill();
  // Back net grid
  const spc2 = W * 0.024;
  cx.strokeStyle = 'rgba(255,255,255,0.05)';
  cx.lineWidth = 0.8 * DPR;
  for (let x = l-dp; x <= r+dp; x += spc2) { cx.beginPath(); cx.moveTo(x,t-dv); cx.lineTo(x,b-dv); cx.stroke(); }
  for (let y = t-dv; y <= b-dv; y += spc2) { cx.beginPath(); cx.moveTo(l-dp,y); cx.lineTo(r+dp,y); cx.stroke(); }
  // --- FRONT NET FACE ---
  cx.fillStyle = 'rgba(0,0,0,0.30)';
  cx.fillRect(l, t, w, h);
  const spacing = W * 0.024;
  cx.strokeStyle = 'rgba(255,255,255,0.07)';
  cx.lineWidth = 0.9 * DPR;
  for (let x = l; x <= r; x += spacing) { cx.beginPath(); cx.moveTo(x, t); cx.lineTo(x, b); cx.stroke(); }
  for (let y = t; y <= b; y += spacing) { cx.beginPath(); cx.moveTo(l, y); cx.lineTo(r, y); cx.stroke(); }
  // Shadow under crossbar
  const shG = cx.createLinearGradient(0, b, 0, b + h*0.14);
  shG.addColorStop(0, 'rgba(0,0,0,0.45)'); shG.addColorStop(1, 'transparent');
  cx.fillStyle = shG; cx.fillRect(l, b, w, h*0.14);
  // --- POSTS ---
  const pw = Math.max(5, 7*DPR);
  // Left post (with 3D side)
  cx.fillStyle = 'rgba(80,80,80,0.7)';
  cx.fillRect(l-pw/2-dp*0.4, t-dv*0.8, dp*0.4, h+dv*0.8);
  let pg = cx.createLinearGradient(l-pw/2, 0, l+pw/2, 0);
  pg.addColorStop(0,'#bbb'); pg.addColorStop(0.45,'#fff'); pg.addColorStop(1,'#999');
  cx.fillStyle = pg; cx.fillRect(l-pw/2, t, pw, h);
  // Right post
  cx.fillStyle = 'rgba(80,80,80,0.5)';
  cx.fillRect(r+pw/2, t-dv*0.8, dp*0.4, h+dv*0.8);
  pg = cx.createLinearGradient(r-pw/2, 0, r+pw/2, 0);
  pg.addColorStop(0,'#999'); pg.addColorStop(0.55,'#fff'); pg.addColorStop(1,'#bbb');
  cx.fillStyle = pg; cx.fillRect(r-pw/2, t, pw, h);
  // Crossbar (with 3D top)
  cx.fillStyle = 'rgba(80,80,80,0.6)';
  cx.fillRect(l-pw/2-dp*0.4, t-pw-dv*0.8, w+pw+dp*0.8, dv*0.8);
  let cg = cx.createLinearGradient(0, t-pw, 0, t);
  cg.addColorStop(0,'#999'); cg.addColorStop(0.5,'#fff'); cg.addColorStop(1,'#bbb');
  cx.fillStyle = cg; cx.fillRect(l-pw/2, t-pw, w+pw, pw);
}

function drawGK() {
  const now = Date.now() / 1000;
  cx.save();
  let e = 0, angle = 0, jumpDy = 0;
  if (gk.diveP > 0 && gk.diveP < 1) {
    gk.diveP = Math.min(1, gk.diveP + 0.055);
    e = 1 - Math.pow(1 - gk.diveP, 3);
    gk.x = PCX() + (gk.diveTarget - PCX()) * e;
    gk.y = gk.y_base + (gk.diveTargetY - gk.y_base) * e;
    angle = gk.diveDir * e * 0.70;
    jumpDy = gk.diveDir !== 0 ? -Math.sin(gk.diveP * Math.PI) * H * 0.018 : 0;
  } else if (gk.diveP === 0) {
    const ist = gk.idleStyle || 0;
    gk.x = PCX() + Math.sin(now * 2.2) * W * (ist === 0 ? 0.010 : 0.028);
    if (ist === 1 || ist === 3) jumpDy = -Math.abs(Math.sin(now * 4.5)) * H * 0.014;
  } else {
    e = 1; angle = gk.diveDir * 0.70;
  }
  gk._e = e; gk._angle = angle; gk._jumpDy = jumpDy;
  const gx = gk.x, gy = gk.y + jumpDy;
  cx.translate(gx, gy);
  cx.rotate(angle);
  const gw = W * 0.055, gh = H * 0.110;

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.28)';
  cx.beginPath(); cx.ellipse(0, gh*0.53, gw*0.78, gw*0.17, 0, 0, Math.PI*2); cx.fill();

  // LEGS — jointed: thigh → shin → boot
  const diveKnee = gk.diveDir !== 0 ? gk.diveDir * e * 0.30 : 0;
  [[-1, diveKnee * 0.5], [1, -diveKnee * 0.3]].forEach(([side, kRot]) => {
    cx.save();
    cx.translate(side * gw * 0.17, gh * 0.20);
    // Shorts on thigh
    cx.fillStyle = gk.jerseyColor2 || '#111';
    cx.fillRect(-gw*0.10, 0, gw*0.20, gh*0.16);
    cx.rotate(kRot);
    // Shin (skin)
    cx.fillStyle = '#c4906a';
    cx.fillRect(-gw*0.09, gh*0.16, gw*0.18, gh*0.16);
    // Sock
    cx.fillStyle = '#fff';
    cx.fillRect(-gw*0.09, gh*0.29, gw*0.18, gh*0.05);
    // Boot
    cx.fillStyle = '#111';
    cx.beginPath();
    cx.ellipse(side*gw*0.02, gh*0.35, gw*0.13, gw*0.06, 0, 0, Math.PI*2);
    cx.fill();
    cx.restore();
  });

  // SHORTS (over thigh tops)
  cx.fillStyle = gk.jerseyColor2 || '#111';
  rrect(-gw*0.33, gh*0.18, gw*0.66, gh*0.13, gw*0.08); cx.fill();

  // BODY — trapezoid torso (wider at shoulders)
  cx.beginPath();
  cx.moveTo(-gw*0.44, -gh*0.38);
  cx.lineTo( gw*0.44, -gh*0.38);
  cx.lineTo( gw*0.33,  gh*0.18);
  cx.lineTo(-gw*0.33,  gh*0.18);
  cx.closePath();
  const jg = cx.createLinearGradient(0, -gh*0.38, 0, gh*0.18);
  jg.addColorStop(0, lighten(gk.jerseyColor, 50));
  jg.addColorStop(0.5, lighten(gk.jerseyColor, 20));
  jg.addColorStop(1, gk.jerseyColor);
  cx.fillStyle = jg; cx.fill();
  // Jersey number
  cx.fillStyle = 'rgba(255,255,255,0.70)';
  cx.font = `bold ${gw*0.40}px 'Fredoka One'`;
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText('1', 0, -gh*0.10);
  // Chest shadow line
  cx.strokeStyle = 'rgba(0,0,0,0.12)'; cx.lineWidth = gw*0.06;
  cx.beginPath(); cx.moveTo(-gw*0.20,-gh*0.38); cx.lineTo(-gw*0.15, gh*0.18); cx.stroke();
  cx.beginPath(); cx.moveTo( gw*0.20,-gh*0.38); cx.lineTo( gw*0.15, gh*0.18); cx.stroke();

  // ARMS — jointed with elbow
  cx.lineCap = 'round';
  if (gk.diveDir !== 0) {
    // Lead arm extended in dive direction
    const lsx = gk.diveDir * gw*0.42, lsy = -gh*0.30;
    const lex = gk.diveDir * (gw*0.44 + gw*0.95*e);
    const ley = -gh*0.28 - gh*0.35*e;
    const emx = (lsx*0.45 + lex*0.55), emy = (lsy + ley)*0.5 + gw*0.04; // elbow midpoint
    // Upper arm (jersey)
    cx.strokeStyle = gk.jerseyColor; cx.lineWidth = gw*0.23;
    cx.beginPath(); cx.moveTo(lsx, lsy); cx.quadraticCurveTo(emx, emy, lex, ley); cx.stroke();
    // Forearm (skin)
    cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.17;
    cx.beginPath(); cx.moveTo(emx, emy); cx.lineTo(lex, ley); cx.stroke();
    // Glove — main (large)
    cx.fillStyle = '#FFDE00';
    cx.beginPath(); cx.arc(lex, ley, gw*0.20, 0, Math.PI*2); cx.fill();
    cx.strokeStyle = 'rgba(180,140,0,0.5)'; cx.lineWidth = 1.5*DPR; cx.stroke();
    // Glove fingers hint
    cx.strokeStyle = 'rgba(0,0,0,0.20)'; cx.lineWidth = 1.5*DPR;
    for (let f = 0; f < 4; f++) {
      const fa = (f - 1.5) * 0.28 + (gk.diveDir > 0 ? 0.5 : 2.6);
      cx.beginPath();
      cx.moveTo(lex + Math.cos(fa)*gw*0.10, ley + Math.sin(fa)*gw*0.10);
      cx.lineTo(lex + Math.cos(fa)*gw*0.20, ley + Math.sin(fa)*gw*0.20);
      cx.stroke();
    }
    // Trail arm folded
    const tsx = -gk.diveDir * gw*0.42, tsy = -gh*0.30;
    cx.strokeStyle = gk.jerseyColor; cx.lineWidth = gw*0.21;
    cx.beginPath(); cx.moveTo(tsx, tsy); cx.lineTo(-gk.diveDir*gw*0.30, -gh*0.06); cx.stroke();
    cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.15;
    cx.beginPath(); cx.moveTo(-gk.diveDir*gw*0.30, -gh*0.06); cx.lineTo(-gk.diveDir*gw*0.14, gh*0.05); cx.stroke();
    cx.fillStyle = '#FFDE00';
    cx.beginPath(); cx.arc(-gk.diveDir*gw*0.14, gh*0.05, gw*0.14, 0, Math.PI*2); cx.fill();
  } else if (gk.diveP > 0 && gk.diveTargetY < PCY()) {
    // Centro-alto: entrambe le braccia alzate
    [-1, 1].forEach(side => {
      const sx = side*gw*0.42, sy = -gh*0.30;
      const ex = side*gw*(0.20 - 0.08*e), ey = -gh*0.30 - gh*0.44*e;
      const emx = side*gw*(0.55 - 0.10*e), emy = -gh*(0.30 + 0.18*e);
      cx.strokeStyle = gk.jerseyColor; cx.lineWidth = gw*0.22;
      cx.beginPath(); cx.moveTo(sx, sy); cx.quadraticCurveTo(emx, emy, ex, ey); cx.stroke();
      cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.15;
      cx.beginPath(); cx.moveTo(emx, emy); cx.lineTo(ex, ey); cx.stroke();
      cx.fillStyle = '#FFDE00';
      cx.beginPath(); cx.arc(ex, ey, gw*0.18, 0, Math.PI*2); cx.fill();
      cx.strokeStyle = 'rgba(180,140,0,0.5)'; cx.lineWidth = 1.5*DPR; cx.stroke();
      cx.strokeStyle = 'rgba(0,0,0,0.20)'; cx.lineWidth = 1.5*DPR;
      for (let f = 0; f < 4; f++) {
        const fa = (f - 1.5) * 0.28 - Math.PI*0.5;
        cx.beginPath();
        cx.moveTo(ex + Math.cos(fa)*gw*0.09, ey + Math.sin(fa)*gw*0.09);
        cx.lineTo(ex + Math.cos(fa)*gw*0.18, ey + Math.sin(fa)*gw*0.18);
        cx.stroke();
      }
    });
  } else {
    // Idle: stile scelto random a ogni rigore
    const ist = gk.idleStyle || 0;
    const useSpread = (ist === 2 || ist === 3);
    const spread = useSpread ? 0.55 + 0.45 * Math.sin(now * 2.2) : 0.55;
    [-1, 1].forEach(side => {
      const sx = side*gw*0.42, sy = -gh*0.30;
      const ex = side*gw*(0.55 + spread*0.55), ey = -gh*0.10 + gh*0.18*(1 - spread);
      const emx = side*gw*(0.60 + spread*0.15), emy = -gh*(0.18 + spread*0.08);
      cx.strokeStyle = gk.jerseyColor; cx.lineWidth = gw*0.22;
      cx.beginPath(); cx.moveTo(sx,sy); cx.quadraticCurveTo(emx,emy,ex,ey); cx.stroke();
      cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.15;
      cx.beginPath(); cx.moveTo(emx,emy); cx.lineTo(ex,ey); cx.stroke();
      cx.fillStyle = '#FFDE00';
      cx.beginPath(); cx.arc(ex, ey, gw*0.15, 0, Math.PI*2); cx.fill();
    });
  }
  cx.lineCap = 'butt';

  // COLLO + MENTO
  cx.fillStyle = '#c4906a';
  cx.beginPath();
  cx.moveTo(-gw*0.18, -gh*0.500);
  cx.lineTo( gw*0.18, -gh*0.500);
  cx.lineTo( gw*0.12, -gh*0.42);
  cx.lineTo(-gw*0.12, -gh*0.42);
  cx.closePath(); cx.fill();
  cx.fillRect(-gw*0.12, -gh*0.42, gw*0.24, gh*0.08);

  // TESTA
  cx.fillStyle = '#c4906a';
  cx.beginPath(); cx.ellipse(0, -gh*0.575, gw*0.33, gw*0.37, 0, 0, Math.PI*2); cx.fill();

  // ORECCHIE
  cx.fillStyle = '#b07850';
  cx.beginPath(); cx.ellipse(-gw*0.33,-gh*0.565,gw*0.07,gw*0.10,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( gw*0.33,-gh*0.565,gw*0.07,gw*0.10,0,0,Math.PI*2); cx.fill();
  cx.fillStyle = '#9a5838';
  cx.beginPath(); cx.ellipse(-gw*0.33,-gh*0.565,gw*0.038,gw*0.055,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( gw*0.33,-gh*0.565,gw*0.038,gw*0.055,0,0,Math.PI*2); cx.fill();

  // CAPELLI
  cx.fillStyle = '#2e1a06';
  cx.beginPath(); cx.ellipse(0,-gh*0.575,gw*0.33,gw*0.37,0,Math.PI,0); cx.fill();
  cx.fillStyle = '#c4906a';
  cx.beginPath(); cx.ellipse(0,-gh*0.550,gw*0.29,gw*0.10,0,Math.PI,0); cx.fill();

  // SOPRACCIGLIA
  cx.strokeStyle = '#2a1505'; cx.lineWidth = gw*0.052; cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(-gw*0.24,-gh*0.549); cx.quadraticCurveTo(-gw*0.14,-gh*0.541,-gw*0.05,-gh*0.543); cx.stroke();
  cx.beginPath(); cx.moveTo( gw*0.24,-gh*0.549); cx.quadraticCurveTo( gw*0.14,-gh*0.541, gw*0.05,-gh*0.543); cx.stroke();
  cx.lineCap = 'butt';

  // OCCHI
  cx.fillStyle = '#fff';
  cx.beginPath(); cx.ellipse(-gw*0.13,-gh*0.524,gw*0.086,gw*0.064,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse( gw*0.13,-gh*0.524,gw*0.086,gw*0.064,0,0,Math.PI*2); cx.fill();
  cx.fillStyle = '#2a7a30';
  cx.beginPath(); cx.arc(-gw*0.13,-gh*0.524,gw*0.048,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc( gw*0.13,-gh*0.524,gw*0.048,0,Math.PI*2); cx.fill();
  cx.fillStyle = '#111';
  cx.beginPath(); cx.arc(-gw*0.13,-gh*0.524,gw*0.027,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc( gw*0.13,-gh*0.524,gw*0.027,0,Math.PI*2); cx.fill();
  cx.fillStyle = 'rgba(255,255,255,0.85)';
  cx.beginPath(); cx.arc(-gw*0.10,-gh*0.532,gw*0.013,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc( gw*0.16,-gh*0.532,gw*0.013,0,Math.PI*2); cx.fill();

  // NASO
  cx.strokeStyle = '#9a6035'; cx.lineWidth = gw*0.044; cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(-gw*0.04,-gh*0.504); cx.lineTo(0,-gh*0.487); cx.lineTo(gw*0.04,-gh*0.504); cx.stroke();
  cx.fillStyle = '#9a6035';
  cx.beginPath(); cx.arc(-gw*0.047,-gh*0.483,gw*0.023,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc( gw*0.047,-gh*0.483,gw*0.023,0,Math.PI*2); cx.fill();
  cx.fillStyle = '#7a4020';
  cx.beginPath(); cx.arc(-gw*0.047,-gh*0.483,gw*0.011,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc( gw*0.047,-gh*0.483,gw*0.011,0,Math.PI*2); cx.fill();
  cx.lineCap = 'butt';

  // BOCCA
  cx.strokeStyle = '#7a3a1a'; cx.lineWidth = gw*0.044; cx.lineCap = 'round';
  cx.beginPath(); cx.arc(0,-gh*0.462,gw*0.14,0.18*Math.PI,0.82*Math.PI); cx.stroke();
  cx.lineCap = 'butt';
  cx.restore();
}

function drawAiShooter() {
  if (!aiRun.active) return;
  cx.save();
  const sx = W * 0.5, sy = aiRun.y;
  cx.translate(sx, sy);
  const gw = W * 0.046, gh = H * 0.092;
  const kicked = aiRun.kicked;
  const kickT = aiRun.kickT || 0;

  // Fasi animazione (stessa logica del player)
  let kickLeg, supportRot, bodyLean, armLdy, armRdy;
  if (!kicked) {
    kickLeg = aiRun.legAngle * 0.65; supportRot = -aiRun.legAngle * 0.35;
    bodyLean = 0; armLdy = 0; armRdy = 0;
  } else if (kickT < 140) {
    const t = kickT / 140;
    kickLeg = lerp(0, 0.75, t); supportRot = lerp(0, -0.08, t);
    bodyLean = lerp(0, 0.08, t); armLdy = lerp(0, -0.18, t); armRdy = lerp(0, 0.14, t);
  } else if (kickT < 260) {
    const t = (kickT - 140) / 120;
    kickLeg = lerp(0.75, -1.20, t); supportRot = lerp(-0.08, 0.18, t);
    bodyLean = lerp(0.08, -0.24, t); armLdy = lerp(-0.18, 0.32, t); armRdy = lerp(0.14, -0.28, t);
  } else {
    const t = Math.min(1, (kickT - 260) / 380);
    kickLeg = lerp(-1.20, -0.88, t); supportRot = lerp(0.18, 0.12, t);
    bodyLean = lerp(-0.24, -0.14, t); armLdy = lerp(0.32, 0.22, t); armRdy = lerp(-0.28, -0.18, t);
  }

  cx.rotate(bodyLean);

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.beginPath(); cx.ellipse(0, gh*0.53, gw*0.70, gw*0.14, 0, 0, Math.PI*2); cx.fill();

  // GAMBA SUPPORTO (sinistra)
  cx.save(); cx.translate(-gw*0.16, gh*0.20);
  cx.fillStyle = aiRun.jerseyColor2 || '#111'; cx.fillRect(-gw*0.10,0,gw*0.20,gh*0.15);
  cx.rotate(supportRot);
  cx.fillStyle = '#c4906a'; cx.fillRect(-gw*0.09,gh*0.15,gw*0.18,gh*0.15);
  cx.fillStyle = '#fff'; cx.fillRect(-gw*0.09,gh*0.27,gw*0.18,gh*0.05);
  cx.fillStyle = '#111'; cx.beginPath(); cx.ellipse(-gw*0.02,gh*0.33,gw*0.12,gw*0.055,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // GAMBA DI TIRO (destra)
  cx.save(); cx.translate(gw*0.16, gh*0.20);
  cx.fillStyle = aiRun.jerseyColor2 || '#111'; cx.fillRect(-gw*0.10,0,gw*0.20,gh*0.15);
  cx.rotate(kickLeg);
  cx.fillStyle = '#c4906a'; cx.fillRect(-gw*0.09,gh*0.15,gw*0.18,gh*0.15);
  cx.fillStyle = '#fff'; cx.fillRect(-gw*0.09,gh*0.27,gw*0.18,gh*0.05);
  cx.fillStyle = '#111'; cx.beginPath(); cx.ellipse(gw*0.02,gh*0.33,gw*0.12,gw*0.055,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // PANTALONCINI
  cx.fillStyle = aiRun.jerseyColor2 || '#111'; rrect(-gw*0.32,gh*0.18,gw*0.64,gh*0.12,gw*0.07); cx.fill();

  // CORPO
  cx.beginPath();
  cx.moveTo(-gw*0.42,-gh*0.38); cx.lineTo(gw*0.42,-gh*0.38);
  cx.lineTo(gw*0.32, gh*0.18); cx.lineTo(-gw*0.32, gh*0.18);
  cx.closePath();
  const jg = cx.createLinearGradient(0,-gh*0.38,0,gh*0.18);
  jg.addColorStop(0,lighten(aiRun.jerseyColor,48)); jg.addColorStop(1,aiRun.jerseyColor);
  cx.fillStyle = jg; cx.fill();

  // BRACCIA asimmetriche
  cx.lineCap = 'round';
  cx.strokeStyle = aiRun.jerseyColor; cx.lineWidth = gw*0.20;
  cx.beginPath(); cx.moveTo(-gw*0.40,-gh*0.28); cx.lineTo(-gw*0.52,-gh*0.08+armLdy*gh*0.28); cx.stroke();
  cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.14;
  cx.beginPath(); cx.moveTo(-gw*0.52,-gh*0.08+armLdy*gh*0.28); cx.lineTo(-gw*0.46,gh*0.06+armLdy*gh*0.14); cx.stroke();
  cx.strokeStyle = aiRun.jerseyColor; cx.lineWidth = gw*0.20;
  cx.beginPath(); cx.moveTo(gw*0.40,-gh*0.28); cx.lineTo(gw*0.52,-gh*0.08+armRdy*gh*0.22); cx.stroke();
  cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.14;
  cx.beginPath(); cx.moveTo(gw*0.52,-gh*0.08+armRdy*gh*0.22); cx.lineTo(gw*0.46,gh*0.06+armRdy*gh*0.10); cx.stroke();
  cx.lineCap = 'butt';

  // COLLO + TESTA (nuca, di spalle) — AI runner
  cx.fillStyle = '#c4906a'; cx.fillRect(-gw*0.13,-gh*0.43,gw*0.26,gh*0.08);
  // Pelle testa
  cx.fillStyle = '#c4906a';
  cx.beginPath(); cx.ellipse(0,-gh*0.50,gw*0.28,gw*0.31,0,0,Math.PI*2); cx.fill();
  // Capelli — solo calotta superiore (clip)
  cx.save();
  cx.beginPath(); cx.ellipse(0,-gh*0.50,gw*0.28,gw*0.31,0,0,Math.PI*2); cx.clip();
  cx.fillStyle = '#2a2a2a';
  cx.fillRect(-gw*0.35, -gh*0.87, gw*0.70, gh*0.45);
  cx.restore();
  // Attaccatura capelli morbida
  const ag2 = cx.createLinearGradient(0,-gh*0.475,0,-gh*0.43);
  ag2.addColorStop(0,'#2a2a2a'); ag2.addColorStop(1,'rgba(196,144,106,0)');
  cx.fillStyle = ag2;
  cx.beginPath(); cx.ellipse(0,-gh*0.475,gw*0.24,gw*0.09,0,0,Math.PI*2); cx.fill();

  // LEAN HINT
  if (leanHint.show) {
    const elapsed = Date.now() - leanHint.t;
    let a = elapsed > 350 ? 1 - (elapsed-350)/200 : 1;
    a = clamp(a,0,1);
    cx.globalAlpha = a * 0.85;
    cx.strokeStyle = 'rgba(255,200,50,0.85)';
    cx.lineWidth = 3.5 * DPR;
    const arrowLen = W * 0.08;
    const dir = leanHint.dir;
    const goL = dir.startsWith('L');
    const goR = dir.startsWith('R');
    if (goL) {
      cx.beginPath(); cx.moveTo(gw*0.3,0); cx.lineTo(gw*0.3-arrowLen,0); cx.stroke();
      cx.beginPath(); cx.moveTo(gw*0.3-arrowLen+8*DPR,-6*DPR); cx.lineTo(gw*0.3-arrowLen,0); cx.lineTo(gw*0.3-arrowLen+8*DPR,6*DPR); cx.stroke();
    } else if (goR) {
      cx.beginPath(); cx.moveTo(-gw*0.3,0); cx.lineTo(-gw*0.3+arrowLen,0); cx.stroke();
      cx.beginPath(); cx.moveTo(-gw*0.3+arrowLen-8*DPR,-6*DPR); cx.lineTo(-gw*0.3+arrowLen,0); cx.lineTo(-gw*0.3+arrowLen-8*DPR,6*DPR); cx.stroke();
    } else {
      cx.lineWidth = 2*DPR;
      cx.beginPath(); cx.moveTo(gw*0.3,0); cx.lineTo(gw*0.3+arrowLen*0.5,0); cx.stroke();
      cx.beginPath(); cx.moveTo(-gw*0.3,0); cx.lineTo(-gw*0.3-arrowLen*0.5,0); cx.stroke();
    }
    cx.globalAlpha = 1;
  }
  cx.restore();
}

function drawBall() {
  const visY = ball.y - ball.z;
  const r = ball.r_draw;
  // Shadow
  const scale = clamp(1 - (H*0.72 - ball.y) / (H*0.52) * 0.32, 0.28, 1);
  cx.fillStyle = `rgba(0,0,0,${0.18 * scale})`;
  cx.beginPath();
  cx.ellipse(ball.x, ball.y + r * 0.38, r * 0.88 * scale, r * 0.22, 0, 0, Math.PI*2);
  cx.fill();
  // Trail
  if (ball.flying && ball.t > 8) {
    const tg = cx.createLinearGradient(ball.x + ball.vx*0.5, visY + ball.vy*0.5, ball.x, visY);
    tg.addColorStop(0, 'rgba(255,255,255,0)');
    tg.addColorStop(1, 'rgba(255,255,255,0.13)');
    cx.strokeStyle = tg;
    cx.lineWidth = r * 1.6;
    cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(ball.x + ball.vx*0.5, visY + ball.vy*0.5);
    cx.lineTo(ball.x, visY);
    cx.stroke();
  }
  // Ball body
  cx.save();
  cx.translate(ball.x, visY);
  const bg = cx.createRadialGradient(-r*0.22, -r*0.26, 0, 0, 0, r);
  bg.addColorStop(0, '#fff'); bg.addColorStop(0.6, '#eee'); bg.addColorStop(1, '#bbb');
  cx.fillStyle = bg;
  cx.beginPath(); cx.arc(0, 0, r, 0, Math.PI*2); cx.fill();
  // Patches
  const rot = ball.t * 0.022 + ball.spin * ball.t * 0.012;
  cx.fillStyle = '#333';
  for (let i = 0; i < 5; i++) {
    const a = rot + i * Math.PI * 2 / 5;
    const px = Math.cos(a) * r * 0.43;
    const py = Math.sin(a) * r * 0.43;
    cx.beginPath();
    for (let j = 0; j < 5; j++) {
      const pa = j * Math.PI * 2 / 5 + rot + i;
      const vx = px + Math.cos(pa) * r * 0.185;
      const vy = py + Math.sin(pa) * r * 0.185;
      j === 0 ? cx.moveTo(vx, vy) : cx.lineTo(vx, vy);
    }
    cx.fill();
  }
  // Shine
  cx.fillStyle = 'rgba(255,255,255,0.48)';
  cx.beginPath(); cx.arc(-r*0.21, -r*0.25, r*0.21, 0, Math.PI*2); cx.fill();
  cx.fillStyle = 'rgba(255,255,255,0.25)';
  cx.beginPath(); cx.arc(-r*0.12, -r*0.15, r*0.1, 0, Math.PI*2); cx.fill();
  cx.restore();
}

function drawAimPreview() {
  if (!td.on || !aim.show) return;
  const spinMag = aim.spinMag || 0;
  const spinDir = aim.spinDir || 0;

  // Traiettoria curva se c'è spin, retta altrimenti
  if (spinMag > 0.15 && spinDir !== 0) {
    // Disegna curva parabolica con effetto laterale
    const steps = 22;
    cx.setLineDash([7*DPR, 6*DPR]);
    cx.strokeStyle = 'rgba(255,215,0,0.42)';
    cx.lineWidth = 2.2*DPR;
    cx.beginPath();
    cx.moveTo(BSX(), BSY());
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const midX = BSX() + (aim.x - BSX()) * t + spinDir * spinMag * PW() * 0.18 * Math.sin(t * Math.PI);
      const midY = BSY() + (aim.y - BSY()) * t;
      cx.lineTo(midX, midY);
    }
    cx.stroke();
    cx.setLineDash([]);
  } else {
    cx.setLineDash([9*DPR, 7*DPR]);
    cx.strokeStyle = 'rgba(255,215,0,0.42)';
    cx.lineWidth = 2.2*DPR;
    cx.beginPath(); cx.moveTo(BSX(), BSY()); cx.lineTo(aim.x, aim.y); cx.stroke();
    cx.setLineDash([]);
  }

  const col = aim.inGoal ? 'rgba(255,215,0,0.85)' : 'rgba(255,70,70,0.85)';
  cx.strokeStyle = col; cx.lineWidth = 2.2*DPR;
  const cs = 16*DPR;
  cx.beginPath(); cx.moveTo(aim.x-cs, aim.y); cx.lineTo(aim.x+cs, aim.y); cx.stroke();
  cx.beginPath(); cx.moveTo(aim.x, aim.y-cs); cx.lineTo(aim.x, aim.y+cs); cx.stroke();
  cx.beginPath(); cx.arc(aim.x, aim.y, cs*0.68, 0, Math.PI*2); cx.stroke();

  // Indicatore effetto: "EFFETTO" scritto con freccia curva se c'è spin
  if (spinMag > 0.25) {
    const fx = aim.x + spinDir * cs * 2.2;
    cx.save();
    cx.globalAlpha = clamp(spinMag * 1.3, 0, 0.9);
    cx.font = `bold ${Math.max(10, 11*DPR)}px 'Fredoka One'`;
    cx.textAlign = spinDir > 0 ? 'left' : 'right';
    cx.textBaseline = 'middle';
    cx.fillStyle = '#FF9900';
    cx.fillText((spinDir > 0 ? '↗' : '↖') + ' EFFETTO', fx, aim.y - cs * 1.4);
    cx.restore();
  }

  // Origin dot
  cx.fillStyle = 'rgba(255,255,255,0.3)';
  cx.beginPath(); cx.arc(BSX(), BSY(), 4*DPR, 0, Math.PI*2); cx.fill();
}

function drawPower() {
  if (!td.on) return;
  const dx = td.cx_ - td.sx, dy = td.cy_ - td.sy;
  const dist = Math.hypot(dx, dy);
  const elapsed = Math.max((Date.now() - td.st) / 1000, 0.04);
  const swipeSpeed = dist / elapsed;
  const power = clamp(swipeSpeed / (W * 3.2), 0, 1);
  const radius = ball.r_draw * 2.1;
  const startA = -Math.PI * 0.78;
  const totalSpan = Math.PI * 1.56;
  // BG arc
  cx.strokeStyle = 'rgba(255,255,255,0.11)';
  cx.lineWidth = 4*DPR;
  cx.beginPath(); cx.arc(BSX(), BSY(), radius, startA, startA + totalSpan); cx.stroke();
  // Power arc
  const hue = power < 0.5 ? 120 - power*90 : 45 - (power-0.5)*90;
  cx.strokeStyle = `hsl(${hue},85%,55%)`;
  cx.lineWidth = 5.5*DPR;
  cx.lineCap = 'round';
  cx.beginPath(); cx.arc(BSX(), BSY(), radius, startA, startA + totalSpan * power); cx.stroke();
  cx.lineCap = 'butt';
}

function drawShootHint() {
  if (td.on) return;
  const now = Date.now() / 1000;
  const alpha = 0.5 + 0.5 * Math.sin(now * 5);
  cx.globalAlpha = alpha;
  cx.fillStyle = '#fff';
  cx.font = `bold ${Math.max(14, 16*DPR)}px 'Fredoka One'`;
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText('⬆ SWIPE VERSO LA PORTA', W*0.5, H*0.88);
  cx.globalAlpha = 1;
  // Timeout warning after 4s - dead code removed
}

function drawTimeout() {
  if (mst !== 'playerShoot') return;
  if (!ball._shootStart) return;
  const elapsed = (Date.now() - ball._shootStart) / 1000;
  const pct = clamp(1 - elapsed / 6, 0, 1);
  const barH = H * 0.6;
  const barY = H * 0.2;
  // Color: gold→orange→red as time runs out
  const hue = pct * 45; // 45=gold → 0=red
  cx.fillStyle = `hsl(${hue},100%,50%)`;
  cx.fillRect(4*DPR, barY + barH * (1 - pct), 4*DPR, barH * pct);
  // Urgency text
  if (elapsed > 4) {
    const a = 0.5 + 0.5 * Math.sin(Date.now()/1000 * 8);
    cx.globalAlpha = a;
    cx.fillStyle = '#FF3333';
    cx.font = `bold ${Math.max(18, 22*DPR)}px 'Fredoka One'`;
    cx.textAlign = 'center';
    cx.fillText('⚠ TIRA!', W*0.5, H*0.68);
    cx.globalAlpha = 1;
  }
}

function drawKeepZones() {
  if (!kZones) return;
  const now = Date.now() / 1000;
  if (!kChoice) {
    cx.fillStyle = 'rgba(255,255,255,0.78)';
    cx.font = `bold ${Math.max(12, 14*DPR)}px 'Fredoka One'`;

  }

  zoneKeys.forEach((zone, i) => {

      cx.fillStyle = 'rgba(255,215,0,0.30)';
      cx.strokeStyle = 'rgba(255,215,0,0.95)';

    } else {
      cx.fillStyle = `rgba(255,255,255,${0.06 + pulse * 0.04})`;
      cx.strokeStyle = `rgba(255,255,255,${0.22 + pulse * 0.14})`;
      cx.lineWidth = 2 * DPR;
    }
    rrect(r.x, r.y, r.w, r.h, 14*DPR);
    cx.fill(); cx.stroke();
    // Freccia grande centrata

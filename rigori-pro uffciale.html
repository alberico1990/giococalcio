    cx.font = `bold ${Math.max(18, 22*DPR)}px 'Fredoka One'`;
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(r.label, r.x + r.w*0.5, r.y + r.h*0.42);
    // Etichetta piccola sotto
    cx.font = `bold ${Math.max(9, 11*DPR)}px 'Fredoka One'`;
    cx.fillStyle = sel ? '#FFD700' : 'rgba(255,255,255,0.55)';
    const labels = { LH:'ALTO SX', CH:'ALTO CTR', RH:'ALTO DX', LL:'BASSO SX', CL:'BASSO CTR', RL:'BASSO DX' };
    cx.fillText(labels[zone] || zone, r.x + r.w*0.5, r.y + r.h*0.78);
  });
}

function drawSlowMoVignette() {
  if (!slo.on) return;
  const rg = cx.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.75);
  rg.addColorStop(0, 'transparent');
  rg.addColorStop(1, `rgba(0,0,0,${0.45 * (1 - slo.f)})`);
  cx.fillStyle = rg;
  cx.fillRect(0, 0, W, H);
}

function drawParts() {
  parts.forEach(p => {
    cx.globalAlpha = clamp(1 - p.age / p.life, 0, 1);
    cx.fillStyle = p.color;
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI*2); cx.fill();
  });
  cx.globalAlpha = 1;
}

function drawTxtFx() {
  if (!txt.show) return;
  const elapsed = Date.now() - txt.t;
  if (elapsed > 1400) { txt.show = false; return; }
  const t = elapsed / 1400;
  // Scale with overshoot
  let s = t < 0.2 ? 0.55 + t/0.2 * 0.55 : 1.0 + Math.sin(elapsed*0.009)*0.015*(1-t);
  if (t < 0.15) s = 0.55 + (t/0.15) * 0.5;
  const alpha = t < 0.75 ? 1 : 1 - (t - 0.75) / 0.25;
  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(W/2, H*0.41);
  cx.scale(s, s);
  cx.font = `bold ${Math.max(26, 34*DPR)}px 'Fredoka One'`;
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.shadowColor = txt.color; cx.shadowBlur = 22*DPR;
  cx.fillStyle = txt.color;
  cx.fillText(txt.text, 0, 0);
  cx.shadowBlur = 0;
  cx.restore();
}

function drawConf() {
  conf.forEach(c => {
    cx.save();
    cx.translate(c.x, c.y);
    cx.rotate(c.rot);
    cx.fillStyle = c.color;
    cx.fillRect(-c.r/2, -c.r*0.3, c.r, c.r*0.6);
    cx.restore();
  });
}

function drawMenuBG() {
  // Floating golden spheres
  const now = Date.now() / 1000;
  for (let i = 0; i < 10; i++) {
    const x = W*0.5 + Math.sin(now*0.3 + i*1.2) * W*0.35;
    const y = H*0.5 + Math.cos(now*0.25 + i*0.9) * H*0.3;
    const r = (20 + i*8) * DPR;
    cx.globalAlpha = 0.04 + (i%3)*0.02;
    cx.fillStyle = '#FFD700';
    cx.beginPath(); cx.arc(x, y, r, 0, Math.PI*2); cx.fill();
  }
  cx.globalAlpha = 1;
}

/* ===== PLAYER KICKER UPDATE ===== */
function updatePlayerKick(dt) {
  if (!playerKick.active) return;
  playerKick.rt += dt * 1000;
  if (playerKick.fkRunning) {
    playerKick.fkRunT = (playerKick.fkRunT || 0) + dt * 1000;
  }
  if (playerKick.kicked) {
    playerKick.kickT = (playerKick.kickT || 0) + dt * 1000;
  } else {
    playerKick.legAngle = Math.sin(playerKick.rt * 0.010) * 0.30;
  }
}

function drawPlayerShooter() {
  if (!playerKick.active) return;
  cx.save();
  // In FK: posizione laterale con rincorsa — il tiratore è offset dal centro
  let sx = BSX(), sy = BSY() - H*0.005;
  if (isFreeKick && playerKick.fkRunning) {
    // Durante la rincorsa: il giocatore si avvicina diagonalmente alla palla
    const runT = clamp(playerKick.fkRunT / 900, 0, 1);
    const ease = 1 - Math.pow(1 - runT, 2); // ease-out
    sx = lerp(playerKick.startX, BSX() + playerKick.fkOffsetX * 0.3, ease);
    sy = lerp(playerKick.startY, BSY() - H*0.005, ease);
  } else if (isFreeKick && !playerKick.kicked) {
    // In attesa di tirare: posizione laterale accanto alla palla
    sx = BSX() + (playerKick.fkOffsetX || 0) * 0.35;
    sy = BSY() - H*0.005;
  }
  cx.translate(sx, sy);
  const gw = W * 0.048, gh = H * 0.098;
  const kicked = playerKick.kicked;
  const kickT = playerKick.kickT || 0;

  // Calcola fasi animazione tiro
  let kickLeg, supportRot, bodyLean, armLdy, armRdy;
  if (isFreeKick && playerKick.fkRunning) {
    // Rincorsa: gambe in corsa alternata veloce
    const stride = Math.sin(playerKick.rt * 0.026) * 0.65;
    kickLeg = stride; supportRot = -stride * 0.5;
    bodyLean = -0.12; // corpo leggermente in avanti mentre corre
    armLdy = -stride * 0.5; armRdy = stride * 0.5;
  } else if (!kicked) {
    const sway = Math.sin(playerKick.rt * 0.010) * 0.25;
    kickLeg = sway * 0.65; supportRot = -sway * 0.35;
    bodyLean = 0; armLdy = 0; armRdy = 0;
  } else if (kickT < 140) {
    const t = kickT / 140;
    kickLeg   = lerp(0,  0.75, t);   // gamba va indietro (carica)
    supportRot= lerp(0, -0.08, t);
    bodyLean  = lerp(0,  0.08, t);   // corpo leggermente indietro
    armLdy    = lerp(0, -0.18, t);   // braccio sx avanti
    armRdy    = lerp(0,  0.14, t);
  } else if (kickT < 260) {
    const t = (kickT - 140) / 120;
    kickLeg   = lerp(0.75, -1.20, t); // snap in avanti — impatto
    supportRot= lerp(-0.08, 0.18, t);
    bodyLean  = lerp(0.08, -0.24, t); // corpo in avanti
    armLdy    = lerp(-0.18, 0.32, t);
    armRdy    = lerp(0.14, -0.28, t);
  } else {
    const t = Math.min(1, (kickT - 260) / 380);
    kickLeg   = lerp(-1.20, -0.88, t); // follow-through, si assesta
    supportRot= lerp(0.18,  0.12, t);
    bodyLean  = lerp(-0.24, -0.14, t);
    armLdy    = lerp(0.32,  0.22, t);
    armRdy    = lerp(-0.28, -0.18, t);
  }

  cx.rotate(bodyLean); // inclinazione corpo

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.24)';
  cx.beginPath(); cx.ellipse(0, gh*0.53, gw*0.72, gw*0.15, 0, 0, Math.PI*2); cx.fill();

  // GAMBA SUPPORTO (sinistra)
  cx.save(); cx.translate(-gw*0.17, gh*0.20);
  cx.fillStyle = playerKick.jerseyColor2 || '#111'; cx.fillRect(-gw*0.10,0,gw*0.20,gh*0.15);
  cx.rotate(supportRot);
  cx.fillStyle = '#c4906a'; cx.fillRect(-gw*0.09,gh*0.15,gw*0.18,gh*0.16);
  cx.fillStyle = '#fff'; cx.fillRect(-gw*0.09,gh*0.28,gw*0.18,gh*0.05);
  cx.fillStyle = '#111'; cx.beginPath(); cx.ellipse(-gw*0.01,gh*0.34,gw*0.13,gw*0.055,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // GAMBA DI TIRO (destra) — animata con fasi
  cx.save(); cx.translate(gw*0.17, gh*0.20);
  cx.fillStyle = playerKick.jerseyColor2 || '#111'; cx.fillRect(-gw*0.10,0,gw*0.20,gh*0.15);
  cx.rotate(kickLeg);
  cx.fillStyle = '#c4906a'; cx.fillRect(-gw*0.09,gh*0.15,gw*0.18,gh*0.16);
  cx.fillStyle = '#fff'; cx.fillRect(-gw*0.09,gh*0.28,gw*0.18,gh*0.05);
  cx.fillStyle = '#111'; cx.beginPath(); cx.ellipse(gw*0.01,gh*0.34,gw*0.13,gw*0.055,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // PANTALONCINI
  cx.fillStyle = playerKick.jerseyColor2 || '#111'; rrect(-gw*0.33,gh*0.18,gw*0.66,gh*0.13,gw*0.07); cx.fill();

  // CORPO
  cx.beginPath();
  cx.moveTo(-gw*0.43,-gh*0.39); cx.lineTo(gw*0.43,-gh*0.39);
  cx.lineTo(gw*0.33, gh*0.18); cx.lineTo(-gw*0.33, gh*0.18);
  cx.closePath();
  const jg = cx.createLinearGradient(0,-gh*0.39,0,gh*0.18);
  jg.addColorStop(0,lighten(playerKick.jerseyColor,50)); jg.addColorStop(1,playerKick.jerseyColor);
  cx.fillStyle = jg; cx.fill();
  cx.fillStyle = 'rgba(255,255,255,0.62)';
  cx.font = `bold ${gw*0.36}px 'Fredoka One'`;
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText('7', 0, -gh*0.10);

  // BRACCIA (asimmetriche durante il tiro)
  cx.lineCap = 'round';
  // Braccio sinistro — va avanti per bilanciamento
  cx.strokeStyle = playerKick.jerseyColor; cx.lineWidth = gw*0.21;
  cx.beginPath(); cx.moveTo(-gw*0.41,-gh*0.28); cx.lineTo(-gw*0.52, -gh*0.08 + armLdy*gh*0.28); cx.stroke();
  cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.14;
  cx.beginPath(); cx.moveTo(-gw*0.52, -gh*0.08 + armLdy*gh*0.28); cx.lineTo(-gw*0.46, gh*0.06 + armLdy*gh*0.14); cx.stroke();
  // Braccio destro — va indietro in contromovimento
  cx.strokeStyle = playerKick.jerseyColor; cx.lineWidth = gw*0.21;
  cx.beginPath(); cx.moveTo(gw*0.41,-gh*0.28); cx.lineTo(gw*0.52, -gh*0.08 + armRdy*gh*0.22); cx.stroke();
  cx.strokeStyle = '#c4906a'; cx.lineWidth = gw*0.14;
  cx.beginPath(); cx.moveTo(gw*0.52, -gh*0.08 + armRdy*gh*0.22); cx.lineTo(gw*0.46, gh*0.06 + armRdy*gh*0.10); cx.stroke();
  cx.lineCap = 'butt';

  // COLLO (nuca) — più alto per collegare bene con la testa
  cx.fillStyle = '#c4906a';
  cx.fillRect(-gw*0.14, -gh*0.44, gw*0.28, gh*0.09);

  // TESTA (vista di spalle) — prima la pelle di tutta la testa
  cx.fillStyle = '#c4906a';
  cx.beginPath(); cx.ellipse(0,-gh*0.555,gw*0.42,gw*0.46,0,0,Math.PI*2); cx.fill();

  // Capelli — coprono solo la parte superiore della testa (3/4 superiori)
  // clip a forma di calotta: parte da metà testa in su
  cx.save();
  cx.beginPath(); cx.ellipse(0,-gh*0.555,gw*0.42,gw*0.46,0,0,Math.PI*2); cx.clip();
  cx.fillStyle = '#1a0e03';
  // Rettangolo che copre solo la parte alta della testa (dal centro in su)
  cx.fillRect(-gw*0.50, -gh*1.05, gw*1.0, gh*0.58);
  cx.restore();

  // Attaccatura capelli sulla nuca — linea morbida con gradiente, non bordo netto
  const hairGrad = cx.createLinearGradient(0, -gh*0.495, 0, -gh*0.44);
  hairGrad.addColorStop(0, '#1a0e03');
  hairGrad.addColorStop(0.5, '#3a2010');
  hairGrad.addColorStop(1, 'rgba(196,144,106,0)');
  cx.fillStyle = hairGrad;
  cx.beginPath(); cx.ellipse(0,-gh*0.495,gw*0.36,gw*0.13,0,0,Math.PI*2); cx.fill();

  cx.restore();
}


/* ===== FREE KICK MODE ===== */
function goFreeKick() {
  sfxTick(); getAC();
  isFreeKick = true;
  fkIdx = 0; fkScore = 0; fkResults = [];
  gst = 'play'; playerShoots = true;
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('sndBtn').style.display = 'flex';
  document.getElementById('homeBtn').style.display = 'flex';
  showScreen(null);
  startCrowdAmbient();
  setupFreeKick();
}

function setupFreeKick() {
  resetObjects();
  isFreeKick = true; playerShoots = true;

  // Angolatura: tiratore posizionato leggermente a sinistra (rincorsa diagonale)
  const fkSide = Math.random() < 0.5 ? -1 : 1; // lato della rincorsa
  playerKick.fkSide = fkSide;
  playerKick.fkOffsetX = fkSide * W * 0.13; // posizione laterale del tiratore
  playerKick.fkRunning = true;  // in fase di rincorsa
  playerKick.fkRunT = 0;        // timer rincorsa (ms)
  playerKick.fkRunDist = H * 0.14; // distanza percorsa dalla rincorsa
  playerKick.startX = BSX() + fkSide * W * 0.13; // parte da lato
  playerKick.startY = BSY() + H * 0.12;           // parte più indietro
  playerKick.active = true; playerKick.kicked = false; playerKick.legAngle = 0; playerKick.rt = 0;
  // Colori squadra selezionata (default azzurro Italia se non selezionata)
  playerKick.jerseyColor = selectedTeam ? selectedTeam.jc : '#0066CC';
  playerKick.jerseyColor2 = selectedTeam ? selectedTeam.jc2 : '#fff';

  // Barriera — 4 giocatori, sfalsati per altezza e posizione
  wall = { active: true, blocked: false, jumped: false,
    players: [-1.5, -0.5, 0.5, 1.5].map((offset, i) => ({
      x: PCX() + offset * W*0.058,
      baseY: H*0.455 + (i % 2 === 0 ? H*0.004 : 0), // sfalsati in altezza
      jumpY: 0, jumpV: 0,
      jumpDelay: i * 55,   // salto sfalsato: ogni giocatore salta 55ms dopo il precedente
      jumpStarted: false
    }))
  };

  // Portiere avversario — colori e GK idle random (come nei rigori)
  gk.jerseyColor = '#CC1111'; gk.jerseyColor2 = '#ffffff';
  gk.idleStyle = Math.floor(Math.random() * 4);

  // 35% anticipo del portiere prima del tiro (una sola volta)
  if (Math.random() < 0.35) {
    fkKeeperTimer = setTimeout(() => {
      if ((mst === 'playerShoot' || mst === 'fkRunup') && !gk.hasDived) {
        gk.hasDived = true;
        const d = zoneToGkDive(Math.random()<0.5 ? 'LL' : 'RL');
        gk.diveDir = d.dir; gk.diveTarget = d.tx; gk.diveTargetY = d.ty; gk.diveP = 0.001;
      }
    }, 1200 + Math.random()*900);
  }

  // Rincorsa dura ~900ms prima di poter tirare
  mst = 'fkRunup'; // stato speciale: rincorsa in corso
  ball._shootStart = Date.now();
  setTimeout(() => {
    if (mst === 'fkRunup') {
      playerKick.fkRunning = false;
      mst = 'playerShoot';
      aim.show = true;
    }
  }, 900);

  shootTimeout = setTimeout(() => {
    if (mst === 'playerShoot') doPlayerShot(PCX(), PCY(), 0.15);
  }, 7900);
  updateFkHud();
}

function updateFkHud() {
  document.getElementById('hudL').innerHTML = '&#127919; PUNIZIONE';
  document.getElementById('hudScore').textContent = fkScore + ' / ' + fkTotal;
  document.getElementById('hudR').innerHTML = '';
  let dots = '';
  for (let i = 0; i < fkTotal; i++) {
    let cls = 'dot';
    if (i < fkResults.length) cls += fkResults[i] ? ' goal' : ' miss';
    else if (i === fkResults.length) cls += ' current';
    dots += '<div class="' + cls + '"></div>';
  }
  document.getElementById('hudDots').innerHTML = dots;
  document.getElementById('hudInfo').textContent = 'Punizione ' + (fkIdx+1) + ' di ' + fkTotal + ' • Swipe per calciare • Effetto con curva!';
}

function fkResult(scored) {
  if (scored) fkScore++;
  fkResults.push(scored);
  fkIdx++;
  updateFkHud();
  advanceTimer = setTimeout(fkAdvance, 1900);
}

function fkAdvance() {
  if (fkIdx >= fkTotal) { showFkResult(); return; }
  setupFreeKick();
}

function showFkResult() {
  gst = 'fkresult';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('sndBtn').style.display = 'none';
  document.getElementById('homeBtn').style.display = 'none';
  stopCrowdAmbient();
  const pct = fkScore / fkTotal;
  let emoji, title, msg;
  if (pct === 1)       { emoji='&#127942;'; title='PERFETTO!';   msg='Tutte in gol! Sei un fenomeno delle punizioni!'; }
  else if (pct >= 0.8) { emoji='&#128293;'; title='OTTIMO!';     msg='Quasi perfetto — un altro allenamento e ci sei!'; }
  else if (pct >= 0.6) { emoji='&#9917;';   title='BUONO!';      msg='Buon risultato, ma puoi fare di meglio!'; }
  else if (pct >= 0.4) { emoji='&#128170;'; title='CI SIAMO!';   msg='Allenati ancora, le punizioni si imparano!'; }
  else                 { emoji='&#128580;'; title='RIPROVA!';    msg='La barriera ti ha fermato... riprova!'; }
  document.getElementById('fkResEmoji').innerHTML = emoji;
  document.getElementById('fkResTitle').textContent = title;
  document.getElementById('fkResScore').textContent = fkScore + ' / ' + fkTotal;
  document.getElementById('fkResMsg').textContent = msg;
  showScreen('scrFkResult');
  if (pct >= 0.6) spawnConfetti();
}

/* ===== BARRIERA (WALL) ===== */
function drawWall() {
  if (!isFreeKick || !wall || !wall.active) return;
  const gw = W*0.040, gh = H*0.082;
  const jcArr = ['#CC1111','#1155CC','#CC1111','#1155CC'];
  const skinTones = ['#c4906a','#d4a882','#8a6040','#c4906a'];
  const hairColors = ['#1a0e03','#3a2010','#1a0e03','#222'];

  wall.players.forEach((p, i) => {
    const py = p.baseY + p.jumpY;
    const jumpE = clamp(-p.jumpY / (H*0.06), 0, 1); // 0=a terra, 1=apice salto
    cx.save(); cx.translate(p.x, py);

    // Ombra
    cx.fillStyle = `rgba(0,0,0,${0.18 - jumpE*0.10})`;
    cx.beginPath(); cx.ellipse(0, gh*0.52+p.jumpY*0.3, gw*0.65*(1-jumpE*0.3), gw*0.12, 0,0,Math.PI*2); cx.fill();

    const jc = jcArr[i], skin = skinTones[i], hair = hairColors[i];

    // GAMBE (due gamba)
    [-1,1].forEach(side => {
      cx.fillStyle = '#111'; cx.fillRect(side*gw*0.08, gh*0.19, gw*0.17, gh*0.16);
      cx.fillStyle = skin; cx.fillRect(side*gw*0.09, gh*0.32, gw*0.15, gh*0.14);
      cx.fillStyle = '#fff'; cx.fillRect(side*gw*0.09, gh*0.43, gw*0.15, gh*0.04);
      cx.fillStyle = '#111'; cx.beginPath(); cx.ellipse(side*gw*0.15, gh*0.49, gw*0.11, gw*0.044, 0,0,Math.PI*2); cx.fill();
    });

    // PANTALONCINI
    cx.fillStyle = '#111'; rrect(-gw*0.27, gh*0.17, gw*0.54, gh*0.13, gw*0.07); cx.fill();

    // CORPO (maglia)
    cx.beginPath();
    cx.moveTo(-gw*0.36,-gh*0.30); cx.lineTo(gw*0.36,-gh*0.30);
    cx.lineTo(gw*0.27, gh*0.17); cx.lineTo(-gw*0.27, gh*0.17);
    cx.closePath();
    const jg2 = cx.createLinearGradient(0,-gh*0.30,0,gh*0.17);
    jg2.addColorStop(0, lighten(jc,40)); jg2.addColorStop(1, jc);
    cx.fillStyle = jg2; cx.fill();

    // BRACCIA — si alzano sopra la testa durante il salto
    cx.lineCap = 'round';
    const armRaise = jumpE; // 0=giù, 1=braccia in alto
    const armAngleL = lerp(Math.PI*0.55, -Math.PI*0.15, armRaise); // sinistra
    const armAngleR = lerp(Math.PI*0.45, -Math.PI*0.05, armRaise); // destra
    // Braccio sinistro
    const alx = -gw*0.35 + Math.cos(armAngleL)*gw*0.38;
    const aly = -gh*0.18 + Math.sin(armAngleL)*gh*0.22;
    cx.strokeStyle = jc; cx.lineWidth = gw*0.20;
    cx.beginPath(); cx.moveTo(-gw*0.35,-gh*0.18); cx.lineTo(alx, aly); cx.stroke();
    cx.strokeStyle = skin; cx.lineWidth = gw*0.14;
    cx.beginPath(); cx.moveTo(alx, aly); cx.lineTo(alx + Math.cos(armAngleL)*gw*0.28, aly + Math.sin(armAngleL)*gh*0.16); cx.stroke();
    // Braccio destro
    const arx = gw*0.35 + Math.cos(Math.PI - armAngleR)*gw*0.38;
    const ary = -gh*0.18 + Math.sin(Math.PI - armAngleR)*gh*0.22;
    cx.strokeStyle = jc; cx.lineWidth = gw*0.20;
    cx.beginPath(); cx.moveTo(gw*0.35,-gh*0.18); cx.lineTo(arx, ary); cx.stroke();
    cx.strokeStyle = skin; cx.lineWidth = gw*0.14;
    cx.beginPath(); cx.moveTo(arx, ary); cx.lineTo(arx + Math.cos(Math.PI - armAngleR)*gw*0.28, ary + Math.sin(Math.PI - armAngleR)*gh*0.16); cx.stroke();
    cx.lineCap = 'butt';

    // COLLO
    cx.fillStyle = skin; cx.fillRect(-gw*0.12,-gh*0.34,gw*0.24,gh*0.06);

    // TESTA (di faccia — la barriera guarda verso il tiratore)
    cx.fillStyle = skin;
    cx.beginPath(); cx.ellipse(0,-gh*0.44,gw*0.22,gw*0.24,0,0,Math.PI*2); cx.fill();

    // Capelli sopra metà testa
    cx.fillStyle = hair;
    cx.beginPath(); cx.ellipse(0,-gh*0.48,gw*0.22,gw*0.16,0,Math.PI,0); cx.fill();

    // Occhi
    cx.fillStyle = '#1a1a1a';
    cx.beginPath(); cx.ellipse(-gw*0.075,-gh*0.43,gw*0.048,gw*0.036,0,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(gw*0.075,-gh*0.43,gw*0.048,gw*0.036,0,0,Math.PI*2); cx.fill();
    // Luccichio occhi
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(-gw*0.068,-gh*0.438,gw*0.015,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(gw*0.082,-gh*0.438,gw*0.015,0,Math.PI*2); cx.fill();

    // Bocca (aperta/chiusa in base al salto)
    if (jumpE > 0.3) {
      // Bocca aperta (grida durante il salto)
      cx.fillStyle = '#5a2020';
      cx.beginPath(); cx.ellipse(0,-gh*0.388,gw*0.065,gw*0.04,0,0,Math.PI*2); cx.fill();
    } else {
      // Bocca chiusa — linea sottile
      cx.strokeStyle = '#8a5040'; cx.lineWidth = gw*0.025;
      cx.beginPath(); cx.moveTo(-gw*0.065,-gh*0.388); cx.lineTo(gw*0.065,-gh*0.388); cx.stroke();
    }

    cx.restore();
  });
}

function updateWall(dt) {
  if (!isFreeKick || !wall || !wall.active) return;
  if (ball.flying && !wall.jumpTriggered) {
    wall.jumpTriggered = true;
    wall._jumpTimer = 0;
  }
  if (wall.jumpTriggered) {
    wall._jumpTimer = (wall._jumpTimer || 0) + dt * 1000;
    wall.players.forEach(p => {
      // Salto sfalsato: ogni giocatore salta al suo delay
      if (!p.jumpStarted && wall._jumpTimer >= p.jumpDelay) {
        p.jumpStarted = true;
        p.jumpV = H * 0.0038;
      }
      if (p.jumpStarted) {
        p.jumpV -= 9.8 * dt * 4.8;
        p.jumpY -= p.jumpV * dt * 60; // jumpY negativo = su
        if (p.jumpY > 0) { p.jumpY = 0; p.jumpV = 0; }
      }
    });
  }
}

/* ===== MAIN LOOP ===== */
let lt = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lt) / 1000, 0.05);
  lt = ts;
  cx.setTransform(1,0,0,1,0,0);
  cx.clearRect(0,0,W,H);
  updShake();
  updConf();
  updSlowMo(dt);
  cx.save();
  cx.translate(shk.x, shk.y);
  if (gst === 'play') {
    drawBG();
    drawGoal();
    drawGK();
    if (mst === 'playerKeep' || (mst === 'flying' && aiRun.active)) drawAiShooter();
    if (isFreeKick) drawWall();
    if (mst === 'playerShoot' || mst === 'fkRunup' || (mst === 'flying' && playerKick.active)) drawPlayerShooter();
    drawBall();
    if (mst === 'playerShoot') {
      drawAimPreview();
      drawPower();
      drawShootHint();
      drawTimeout();
    }
    if (mst === 'fkRunup') {
      // Messaggio durante la rincorsa
      const alpha = 0.55 + 0.45 * Math.sin(Date.now() * 0.008);
      cx.globalAlpha = alpha;
      cx.fillStyle = '#FFD700';
      cx.font = `bold ${Math.max(13, 14*DPR)}px 'Fredoka One'`;
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('RINCORSA...', W*0.5, H*0.88);
      cx.globalAlpha = 1;
    }
    if (mst === 'playerKeep') drawKeepZones();
    drawSlowMoVignette();
    drawParts();
    drawTxtFx();
    updateBall(dt * slo.f);
    updateParts(dt);
    if (isFreeKick) updateWall(dt * slo.f);
    updateAiRunner(dt * slo.f);
    updatePlayerKick(dt * slo.f);
  } else {
    drawMenuBG();
  }
  if (conf.length) drawConf();
  // Goal flash
  if (goalFlash.active) {
    const gfe = Date.now() - goalFlash.t;
    if (gfe < 280) {
      cx.globalAlpha = (1 - gfe/280) * 0.55;
      cx.fillStyle = '#FFD700';
      cx.fillRect(0, 0, W, H);
      cx.globalAlpha = 1;
    } else { goalFlash.active = false; }
  }
  cx.restore();
}

document.fonts.ready.then(() => requestAnimationFrame(loop));
</script>
